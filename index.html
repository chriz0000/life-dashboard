<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Life Dashboard</title>
<meta name="description" content="Christian's life dashboard" />

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#FAF8F5" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Dashboard" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" type="image/png" />

<style>
  :root {
    --bg: #FAF8F5;
    --card: #FFFFFF;
    --text: #2C2825;
    --text-2: #8A8279;
    --text-3: #B5AFA8;
    --blue: #5B8DB8;
    --green: #5B9A6F;
    --orange: #C68B4B;
    --red: #C45C4A;
    --purple: #8B7BB5;
    --track: #EDEAE6;
    --well: #F5F2EE;
    --separator: rgba(120,100,80,0.08);
    --shadow: 0 1px 3px rgba(120,100,80,0.06), 0 1px 2px rgba(120,100,80,0.03);
    --taupe: #A3927F;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { background: var(--bg); }

  body {
    font-family: -apple-system, "SF Pro Display", "SF Pro Text", system-ui, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    color: var(--text);
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 28px 56px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ---------- Layout grids ---------- */
  .top-row { display: grid; grid-template-columns: 1fr 1.4fr; gap: 24px; align-items: stretch; }
  .second-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; align-items: stretch; }
  .pillars-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .pillars-grid > *:last-child:nth-child(odd) { grid-column: 1 / -1; }
  .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }

  @media (max-width: 980px) {
    .top-row, .second-row, .pillars-grid, .bottom-row { grid-template-columns: 1fr; }
  }

  /* ---------- Card ---------- */
  .card {
    background: var(--card); border-radius: 20px; padding: 24px; box-shadow: var(--shadow);
    display: flex; flex-direction: column; gap: 16px; animation: fadeUp 0.5s ease both;
  }

  /* ---------- Section headers ---------- */
  .section-header, .subsection-label {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--text-2);
  }
  .top-section-header { padding-left: 4px; }

  /* ---------- Gauges ---------- */
  .gauge { position: relative; flex-shrink: 0; }
  .gauge-arc { transition: stroke-dashoffset 1.3s cubic-bezier(.4,0,.2,1) 0.2s; }
  .gauge-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
  }
  .gauge-value { font-weight: 700; letter-spacing: -0.5px; line-height: 1; }
  .gauge-sublabel { font-size: 11px; color: var(--text-2); font-weight: 600; margin-top: 4px; }

  /* ---------- Header card ---------- */
  .header-card { justify-content: center; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .greeting { font-size: 28px; font-weight: 600; letter-spacing: -0.4px; }
  .date { font-size: 16px; color: var(--text-2); margin-top: 2px; }
  .refresh-btn {
    width: 36px; height: 36px; border-radius: 50%; background: var(--well);
    display: flex; align-items: center; justify-content: center; color: var(--text-2);
    flex-shrink: 0; transition: transform 0.2s ease, background-color 0.2s ease;
  }
  .refresh-btn:active { transform: scale(0.9) rotate(180deg); background: var(--track); }

  .life-score-block {
    display: flex; align-items: center; gap: 24px; margin-top: 20px; cursor: pointer;
    -webkit-user-select: none; user-select: none;
  }
  .life-score-text { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .life-score-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .life-score-desc { font-size: 13px; color: var(--text-2); line-height: 1.5; }
  .life-score-breakdown { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; overflow: hidden; }
  .life-score-block.expanded .life-score-breakdown { grid-template-rows: 1fr; }
  .life-score-breakdown-inner { overflow: hidden; min-height: 0; }
  .life-score-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0; font-size: 13px; color: var(--text-2); border-top: 1px solid var(--separator);
  }
  .life-score-item:first-child { border-top: none; padding-top: 10px; }
  .life-score-item b { color: var(--text); font-weight: 600; }

  /* ---------- Focus list ---------- */
  .focus-list { display: flex; flex-direction: column; }
  .focus-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid var(--separator);
  }
  .focus-item:first-child { padding-top: 0; }
  .focus-item:last-child { border-bottom: none; padding-bottom: 0; }
  .focus-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .focus-num { font-size: 14px; color: var(--text-3); font-weight: 600; flex-shrink: 0; width: 20px; }
  .focus-text { font-size: 16px; font-weight: 400; line-height: 1.5; }
  .focus-item.done { opacity: 0.4; }
  .focus-item.done .focus-text { text-decoration: line-through; }
  .focus-checkbox {
    width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--track);
    flex-shrink: 0; margin-top: 3px; display: flex; align-items: center; justify-content: center;
    color: #fff; transition: background-color 0.2s ease, border-color 0.2s ease;
  }
  .focus-item.done .focus-checkbox { background: var(--green); border-color: var(--green); }
  .tappable { cursor: pointer; transition: transform 0.2s ease, background-color 0.2s ease; -webkit-user-select: none; user-select: none; }
  .tappable:active { transform: scale(0.98); }

  /* ---------- Email list ---------- */
  .email-list { display: flex; flex-direction: column; }
  .email-row-wrap {
    position: relative; overflow: hidden; border-bottom: 1px solid var(--separator);
    max-height: 200px; transition: max-height 0.3s ease, opacity 0.3s ease;
  }
  .email-row-wrap:last-child { border-bottom: none; }
  .email-row-wrap.removing { max-height: 0; opacity: 0; border-bottom: none; }
  .email-row {
    display: flex; flex-direction: column; gap: 4px; padding: 13px 0;
    background: var(--card); position: relative; z-index: 1; transition: transform 0.3s ease;
  }
  .email-row-wrap:first-child .email-row { padding-top: 0; }
  .email-row-wrap:last-child .email-row { padding-bottom: 0; }
  .email-row-wrap.swiped .email-row { transform: translateX(-84px); }
  .email-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .email-sender { font-size: 15px; font-weight: 600; letter-spacing: -0.1px; }
  .email-time { font-size: 13px; color: var(--text-3); flex-shrink: 0; font-weight: 400; }
  .email-subject { font-size: 14px; color: var(--text-2); white-space: normal; line-height: 1.4; }
  .email-dismiss {
    position: absolute; top: 0; right: -84px; bottom: 0; width: 84px;
    background: var(--red); color: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; border-radius: 10px; transition: right 0.3s ease;
  }
  .email-row-wrap.swiped .email-dismiss { right: 0; }

  /* ---------- Schedule ---------- */
  .day-bar { display: flex; gap: 6px; margin-bottom: 16px; }
  .day-cell {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 0; border-radius: 12px; background: var(--well);
    font-size: 13px; font-weight: 600; color: var(--text-2);
  }
  .day-cell.is-today { background: var(--blue); color: #fff; }
  .timeline { display: flex; flex-direction: column; gap: 16px; }
  .timeline-row { display: flex; gap: 14px; align-items: flex-start; }
  .timeline-time { font-size: 13px; color: var(--text-3); font-weight: 600; width: 64px; flex-shrink: 0; padding-top: 2px; }
  .timeline-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .timeline-content { flex: 1; min-width: 0; }
  .timeline-title { font-size: 16px; font-weight: 500; }
  .timeline-sub { font-size: 13px; color: var(--text-3); margin-top: 3px; }
  .timeline-detail { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; overflow: hidden; }
  .timeline-row.expanded .timeline-detail { grid-template-rows: 1fr; }
  .timeline-detail-inner { overflow: hidden; min-height: 0; }
  .timeline-detail-text { font-size: 13px; color: var(--text-3); padding-top: 8px; line-height: 1.5; }

  /* ---------- Quick stats ---------- */
  .quick-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .quick-stat-item {
    display: flex; align-items: center; gap: 12px; background: var(--well);
    border-radius: 14px; padding: 12px;
  }
  .quick-stat-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .quick-stat-name { font-size: 14px; font-weight: 600; }
  .quick-stat-status { font-size: 12px; color: var(--text-2); }

  /* ---------- Pillar cards ---------- */
  .pillar-card {
    background: var(--card); border-radius: 20px; padding: 24px; box-shadow: var(--shadow);
    display: flex; flex-direction: column; gap: 18px; animation: fadeUp 0.5s ease both;
  }
  .pillar-header { display: flex; align-items: center; gap: 14px; }
  .pillar-icon {
    width: 48px; height: 48px; border-radius: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--icon-bg); color: var(--icon-fg);
  }
  .pillar-info { flex: 1; min-width: 0; }
  .pillar-name { font-size: 19px; font-weight: 600; letter-spacing: -0.2px; }
  .pillar-status { font-size: 13px; font-weight: 500; margin-top: 2px; }
  .pillar-body { display: flex; flex-direction: column; gap: 18px; }

  /* ---------- Stat grid ---------- */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .stat-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .stat-grid.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .stat-box { background: var(--well); border-radius: 14px; padding: 16px; }
  .stat-label { font-size: 12px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .stat-value { font-size: 26px; font-weight: 600; margin-top: 8px; letter-spacing: -0.4px; display: flex; align-items: center; gap: 8px; }
  .stat-sub { font-size: 13px; color: var(--text-3); margin-top: 4px; }
  @media (max-width: 1240px) {
    .stat-grid.cols-4 { grid-template-columns: 1fr 1fr; }
  }

  /* ---------- Hero stat (countdown gauge) ---------- */
  .hero-stat-block {
    background: var(--well); border-radius: 16px; padding: 20px;
    display: flex; align-items: center; gap: 24px;
  }
  .hero-stat-text { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 0; }
  .hero-stat-title { font-size: 16px; font-weight: 600; }
  .hero-stat-sub { font-size: 13px; color: var(--text-2); line-height: 1.5; }
  .hero-stat-pace { font-size: 13px; color: var(--text-3); margin-top: 2px; line-height: 1.5; }

  /* ---------- Segments (training / phases) ---------- */
  .segments { display: flex; gap: 5px; }
  .segment { flex: 1; height: 10px; border-radius: 5px; background: var(--track); }
  .segment.done { background: var(--green); }
  .segment.current { background: var(--blue); }
  .segment.active { background: var(--orange); animation: pulseSeg 2s ease-in-out infinite; }
  .segment-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-3); margin-top: 8px; font-weight: 500; }
  @keyframes pulseSeg { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ---------- Lists ---------- */
  .list { display: flex; flex-direction: column; gap: 10px; }
  .list-row { display: flex; align-items: center; justify-content: space-between; background: var(--well); border-radius: 14px; padding: 14px 16px; }
  .list-row.is-current { box-shadow: inset 0 0 0 1.5px var(--blue); }
  .list-main { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .list-name { font-size: 16px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; }
  .list-sub { font-size: 13px; color: var(--text-3); }
  .list-sub.is-overdue { color: var(--red); }
  .list-sub.is-due-today { color: var(--orange); }
  .list-amount { font-size: 16px; font-weight: 600; flex-shrink: 0; padding-left: 12px; }
  .list-amount.is-overdue { color: var(--red); }
  .list-amount.is-due-today { color: var(--orange); }

  /* ---------- Generic dot ---------- */
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* ---------- Progress rows (knowledge) ---------- */
  .progress-rows { display: flex; flex-direction: column; gap: 18px; }
  .progress-rows.cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 24px; }
  .progress-rows.cols-2 > div:last-child { grid-column: 1 / -1; }
  .progress-row-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; gap: 8px; }
  .progress-name { font-size: 16px; font-weight: 500; }
  .progress-value { font-size: 13px; color: var(--text-2); flex-shrink: 0; text-align: right; }
  .progress-track { height: 8px; background: var(--track); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; width: 0%; background: var(--blue); transition: width 1.1s cubic-bezier(.4,0,.2,1) 0.15s; }
  .progress-sub { font-size: 13px; color: var(--text-3); margin-top: 7px; }
  .progress-pct { font-size: 12px; color: var(--text-3); font-weight: 600; margin-left: 6px; }

  /* ---------- Habit tracker (30 day) ---------- */
  .habit-grid-30 { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
  .habit-cell-30 {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    background: var(--well); border-radius: 10px; padding: 10px 4px;
  }
  .habit-cell-30 .habit-day { font-size: 10px; color: var(--text-3); font-weight: 600; text-transform: uppercase; }
  @media (max-width: 700px) {
    .habit-grid-30 { grid-template-columns: repeat(6, 1fr); }
  }

  /* ---------- Check rows (quests / tasks) ---------- */
  .check-row { display: flex; align-items: center; gap: 12px; background: var(--well); border-radius: 14px; padding: 14px 16px; }
  .check-icon {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .check-text { font-size: 15px; font-weight: 500; }

  /* ---------- Inventory grid ---------- */
  .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .inv-box { background: var(--well); border-radius: 14px; padding: 16px; }
  .inv-name { font-size: 13px; color: var(--text-2); font-weight: 500; }
  .inv-units { font-size: 22px; font-weight: 600; margin-top: 6px; letter-spacing: -0.2px; }
  .inv-units span { font-size: 13px; color: var(--text-3); font-weight: 400; margin-left: 4px; }

  /* ---------- Chart ---------- */
  .chart-wrap { background: var(--well); border-radius: 14px; padding: 16px 16px 12px; height: 230px; position: relative; }
  .chart-wrap.short { height: 180px; }
  .chart-wrap canvas { max-height: 100% !important; }

  /* ---------- Placeholder ---------- */
  .placeholder { background: var(--well); border-radius: 14px; padding: 18px; color: var(--text-3); font-size: 14px; line-height: 1.6; }

  /* ---------- Week table (training schedule) ---------- */
  .week-table { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .week-table-cell {
    background: var(--well); border-radius: 14px; padding: 14px 8px; text-align: center;
    display: flex; flex-direction: column; gap: 8px; cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .week-table-cell:active { transform: scale(0.96); }
  .week-table-cell.is-today { background: var(--blue); color: #fff; }
  .week-table-cell.is-selected:not(.is-today) { box-shadow: inset 0 0 0 1.5px var(--blue); }
  .week-table-day { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .week-table-workout { font-size: 13px; font-weight: 500; line-height: 1.3; }
  .week-detail {
    background: var(--well); border-radius: 14px; padding: 14px 16px;
    font-size: 13px; color: var(--text-2); line-height: 1.5; margin-top: 4px;
  }
  .week-detail b { color: var(--text); }
  @media (max-width: 700px) {
    .week-table { grid-template-columns: repeat(4, 1fr); }
  }

  /* ---------- Data table (bills) ---------- */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-2);
    text-align: left; padding: 0 10px 10px; font-weight: 600;
  }
  .data-table th.amount-col, .data-table td.amount-col { text-align: right; }
  .data-table td { padding: 14px 10px; font-size: 15px; border-top: 1px solid var(--separator); }
  .data-table tr:first-child td { border-top: none; }
  .data-table td.amount-col { font-weight: 600; }
  .data-table tr.is-paid td { text-decoration: line-through; color: var(--text-3) !important; }
  .data-table tr { cursor: pointer; }
  .status-pill {
    font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 8px;
    display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;
  }
  .status-pill.overdue { background: rgba(196,92,74,0.1); color: var(--red); }
  .status-pill.due-today { background: rgba(198,139,75,0.1); color: var(--orange); }
  .status-pill.upcoming { background: var(--track); color: var(--text-2); }
  .status-pill.paid { background: rgba(91,154,111,0.1); color: var(--green); }

  /* ---------- Accounts ---------- */
  .account-list { display: flex; flex-direction: column; }
  .account-row { display: flex; flex-direction: column; gap: 0; padding: 12px 0; border-bottom: 1px solid var(--separator); cursor: pointer; }
  .account-row:first-child { padding-top: 0; }
  .account-row:last-child { border-bottom: none; padding-bottom: 0; }
  .account-row-top { display: flex; align-items: center; justify-content: space-between; }
  .account-name { font-size: 15px; font-weight: 500; }
  .account-badge {
    font-size: 13px; font-weight: 600; color: var(--text-2);
    background: var(--well); border-radius: 8px; padding: 4px 10px;
  }
  .account-badge.has-unread { color: var(--blue); background: rgba(91,141,184,0.1); }
  .account-subjects { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; overflow: hidden; }
  .account-row.expanded .account-subjects { grid-template-rows: 1fr; }
  .account-subjects-inner { overflow: hidden; min-height: 0; }
  .account-subject { font-size: 13px; color: var(--text-3); padding-top: 7px; margin-top: 7px; border-top: 1px solid var(--separator); line-height: 1.4; }
  .account-subjects-empty { font-size: 13px; color: var(--text-3); padding-top: 7px; margin-top: 7px; border-top: 1px solid var(--separator); }

  /* ---------- WHOOP ---------- */
  .whoop-card { transition: background-color 0.4s ease, box-shadow 0.4s ease; }
  .whoop-header { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .whoop-band { font-size: 13px; font-weight: 600; }
  .whoop-main { display: flex; gap: 28px; align-items: center; flex-wrap: wrap; }
  .whoop-gauges { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .whoop-side { flex: 1; min-width: 220px; display: flex; flex-direction: column; gap: 14px; }
  .whoop-trend-placeholder {
    background: var(--well); border-radius: 14px; padding: 14px 16px;
    font-size: 13px; color: var(--text-3); line-height: 1.5;
  }
  @media (max-width: 980px) {
    .whoop-gauges { justify-content: center; width: 100%; }
  }

  /* ---------- Verse block (Spirit) ---------- */
  .verse-block {
    background: var(--well); border-radius: 14px; padding: 26px 24px;
    font-size: 18px; font-style: italic; line-height: 1.6; color: var(--text); text-align: center;
  }
  .verse-ref {
    font-size: 13px; font-style: normal; font-weight: 600; color: var(--text-2);
    margin-top: 14px; letter-spacing: 0.3px;
  }

  /* ---------- Knowledge area cards ---------- */
  .knowledge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .knowledge-card { background: var(--well); border-radius: 14px; padding: 18px; display: flex; flex-direction: column; gap: 10px; }
  .knowledge-card-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .knowledge-card-name { font-size: 16px; font-weight: 600; }
  .knowledge-card-status {
    font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 8px;
    background: var(--track); color: var(--text-2); white-space: nowrap;
  }
  .knowledge-card-meta { font-size: 13px; color: var(--text-3); }
  .knowledge-card-milestone { font-size: 13px; color: var(--text-2); line-height: 1.5; }
  .knowledge-card-milestone b { color: var(--text); font-weight: 600; }
  @media (max-width: 700px) {
    .knowledge-grid { grid-template-columns: 1fr; }
  }

  /* ---------- Footer ---------- */

/* =========================================================
   GAUGES — circular SVG gauges with animated stroke-dashoffset
   ========================================================= */
function circularGauge({ percent, size = 120, stroke = 10, color, valueText, sublabel, valueSize }) {
  const radius = (size - stroke) / 2;
  const circumference = 2 * Math.PI * radius;
  const center = size / 2;
  const pct = Math.max(0, Math.min(100, percent));
  const targetOffset = circumference * (1 - pct / 100);
  const vSize = valueSize || Math.round(size * 0.28);
  return `
    <div class="gauge" style="width:${size}px; height:${size}px;">
      <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
        <circle cx="${center}" cy="${center}" r="${radius}" fill="none" stroke="var(--track)" stroke-width="${stroke}"/>
        <circle class="gauge-arc" cx="${center}" cy="${center}" r="${radius}" fill="none" stroke="${color}"
          stroke-width="${stroke}" stroke-linecap="round"
          stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}"
          data-offset="${targetOffset}"
          transform="rotate(-90 ${center} ${center})"/>
      </svg>
      <div class="gauge-center">
        <div class="gauge-value" style="font-size:${vSize}px;">${valueText}</div>
        ${sublabel ? `<div class="gauge-sublabel">${sublabel}</div>` : ""}
      </div>
    </div>
  `;
}

function animateGauges(root = document) {
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      root.querySelectorAll(".gauge-arc").forEach(el => {
        el.style.strokeDashoffset = el.dataset.offset;
      });
    });
  });
}

   RENDER: DAILY MOTIVATION
   ========================================================= */
function renderMotivation() {
  const recovery = DATA.whoop.recovery;
  const streak = DATA.pillars.find(p => p.key === "discipline").streak;
  const daysOut = DATA.pillars.find(p => p.key === "physical").marathon.daysOut;

  let message;
  if (recovery > 80) message = "Your body is primed — make today count";

  document.getElementById("motivationLine").textContent = message;
}

/* =========================================================
   SHARED BLOCK BUILDERS
   ========================================================= */
function labeled(label, innerHtml) {
  return `<div><div class="subsection-label" style="margin-bottom:10px;">${label}</div>${innerHtml}</div>`;
}

function statGrid(items, cols) {
  const colClass = cols === 2 ? "cols-2" : cols === 4 ? "cols-4" : "";
  return `
    <div class="stat-grid ${colClass}">
      ${items.map(s => `
        <div class="stat-box tappable">
          <div class="stat-label">${s.label}</div>
          <div class="stat-value">${s.dot ? `<span class="dot" style="background:${COLOR[s.dot]}"></span>` : ""}${s.value}</div>
          ${s.sub ? `<div class="stat-sub">${s.sub}</div>` : ""}
        </div>
      `).join("")}
    </div>
  `;
}

function heroGaugeBlock({ percent, color, valueText, sublabel, title, sub, pace }) {
  return `
    <div class="hero-stat-block">
      ${circularGauge({ percent, size: 130, stroke: 11, color, valueText, sublabel, valueSize: 36 })}
      <div class="hero-stat-text">
        <div class="hero-stat-title">${title}</div>
        <div class="hero-stat-sub">${sub}</div>
        ${pace ? `<div class="hero-stat-pace">${pace}</div>` : ""}
      </div>
    </div>
  `;
}

function segmentBlock(seg) {
  return `
    <div class="segments">
      ${seg.items.map(state => `<div class="segment ${state}"></div>`).join("")}
    </div>
    ${seg.sublabels ? `<div class="segment-labels">${seg.sublabels.map(l => `<span>${l}</span>`).join("")}</div>` : ""}
  `;
}

function listRows(items) {
  return `
    <div class="list">
      ${items.map(it => `
        <div class="list-row ${it.isCurrent ? "is-current" : ""}">
          <div class="list-main">
            <span class="list-name">${it.dotColor ? dotSvg(it.dotColor) : ""}${it.name}</span>
            ${it.sub ? `<span class="list-sub ${it.overdue ? "is-overdue" : ""} ${it.dueToday ? "is-due-today" : ""}">${it.sub}</span>` : ""}
          </div>
          ${it.amount != null ? `<span class="list-amount ${it.overdue ? "is-overdue" : ""} ${it.dueToday ? "is-due-today" : ""}">${it.amount}</span>` : ""}
        </div>
      `).join("")}
    </div>
  `;
}

/* ---------- Week schedule as a horizontal table with detail panel ---------- */
function weekTableBlock(ws) {
  const todayIndex = ws.items.findIndex(it => it.day === ws.today);
  const cells = ws.items.map((it, i) => `
    <div class="week-table-cell ${it.day === ws.today ? "is-today" : ""} ${i === todayIndex ? "is-selected" : ""}" data-index="${i}">
      <span class="week-table-day">${it.day}${it.day === ws.today ? " · Today" : ""}</span>
      <span class="week-table-workout">${it.workout}</span>
    </div>
  `).join("");

  return `
    <div class="week-table" id="weekTable">${cells}</div>
    <div class="week-detail" id="weekDetail"><b>${ws.items[todayIndex].day}</b> — ${ws.items[todayIndex].detail}</div>
  `;
}

function setupWeekTable(ws) {
  const table = document.getElementById("weekTable");
  const detail = document.getElementById("weekDetail");
  if (!table) return;
  table.querySelectorAll(".week-table-cell").forEach(cell => {
    cell.addEventListener("click", () => {
      const it = ws.items[parseInt(cell.dataset.index, 10)];
      table.querySelectorAll(".week-table-cell").forEach(c => c.classList.remove("is-selected"));
      cell.classList.add("is-selected");
      detail.innerHTML = `<b>${it.day}</b> — ${it.detail}`;
    });
  });
}

/* ---------- Bills table ---------- */
function billsTableBlock(items, tableId) {
  const statusFor = (it) => {
    if (it.overdue) return `<span class="status-pill overdue">Overdue</span>`;
    if (it.dueToday) return `<span class="status-pill due-today">Due today</span>`;
    return `<span class="status-pill upcoming">Upcoming</span>`;
  };
  return `
    <table class="data-table" id="${tableId}">
      <thead>
        <tr>
          <th>Name</th>
          <th class="amount-col">Amount</th>
          <th>Due</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        ${items.map(it => `
          <tr data-overdue="${!!it.overdue}" data-due-today="${!!it.dueToday}">
            <td>${it.name}</td>
            <td class="amount-col">${it.amount}</td>
            <td>${it.due}</td>
            <td>${statusFor(it)}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

function setupBillsTable(tableId) {
  const table = document.getElementById(tableId);
  if (!table) return;
  table.querySelectorAll("tbody tr").forEach(row => {
    const statusCell = row.children[3];
    row.addEventListener("click", () => {
      const wasPaid = row.classList.toggle("is-paid");
      if (wasPaid) {
        statusCell.innerHTML = `<span class="status-pill paid">${svgIcon("check", 10, 3)} Paid</span>`;
      } else {
        if (row.dataset.overdue === "true") statusCell.innerHTML = `<span class="status-pill overdue">Overdue</span>`;
        else if (row.dataset.dueToday === "true") statusCell.innerHTML = `<span class="status-pill due-today">Due today</span>`;
        else statusCell.innerHTML = `<span class="status-pill upcoming">Upcoming</span>`;
      }
    });
  });
}

function checkRows(items) {
  return `
    <div class="list">
      ${items.map(it => {
        const done = it.state === "done" || it.done === true;
        const pending = it.state === "pending";
        let bg, fg, icon;
        if (done) { bg = hexToRgba(COLOR.green, 0.1); fg = COLOR.green; icon = svgIcon("check", 12, 2.5); }
        else if (pending) { bg = hexToRgba(COLOR.orange, 0.1); fg = COLOR.orange; icon = ""; }
        else { bg = "var(--track)"; fg = COLOR.gray; icon = ""; }
        return `
          <div class="check-row">
            <span class="check-icon" style="background:${bg}; color:${fg}">${icon}</span>
            <span class="check-text">${it.text}</span>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function inventoryBlock(items) {
  return `
    <div class="inv-grid">
      ${items.map(i => `
        <div class="inv-box">
          <div class="inv-name">${i.name}</div>
          <div class="inv-units">${i.units.toLocaleString()}<span>units</span></div>
        </div>
      `).join("")}
    </div>
  `;
}

function progressRows(items, cols2) {
  return `
    <div class="progress-rows ${cols2 ? "cols-2" : ""}">
      ${items.map((it, i) => `
        <div>
          <div class="progress-row-top">
            <span class="progress-name">${it.name}</span>
            <span class="progress-value">${it.value}<span class="progress-pct">${it.percent}%</span></span>
          </div>
          <div class="progress-track"><div class="progress-fill" data-pct="${it.percent}" id="progress-${i}-${it.name.replace(/[^a-zA-Z0-9]/g, "")}"></div></div>
          ${it.sub ? `<div class="progress-sub">${it.sub}</div>` : ""}
        </div>
      `).join("")}
    </div>
  `;
}

function animateProgressRows(root) {
  root.querySelectorAll(".progress-fill").forEach(el => {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.width = `${el.dataset.pct}%`;
    }));
  });
}

/* ---------- Knowledge area cards ---------- */
function computeKnowledgeScore(areas) {
  const pcts = areas.map(a => {
    if (a.type === "language") return (a.level / a.maxLevel) * 100;
    if (a.type === "reading") return (a.booksCompleted / a.goal) * 100;
    if (a.status === "Research phase") return 5;
    return 0;
  });
  return Math.round(pcts.reduce((a, b) => a + b, 0) / pcts.length);
}

function knowledgeAreaCard(a) {
  if (a.type === "language") {
    const pct = Math.round((a.level / a.maxLevel) * 100);
    return `
      <div class="knowledge-card">
        <div class="knowledge-card-top">
          <span class="knowledge-card-name">${a.name}</span>
          <span class="knowledge-card-status">${a.status}</span>
        </div>
        <div class="progress-row-top">
          <span class="progress-value">Level ${a.level}/${a.maxLevel}</span>
          <span class="progress-value">${a.hours}h practiced</span>
        </div>
        <div class="progress-track"><div class="progress-fill" data-pct="${pct}"></div></div>
        <div class="knowledge-card-milestone">Next milestone: <b>${a.milestone}</b></div>
      </div>
    `;
  }
  if (a.type === "reading") {
    const pct = Math.round((a.booksCompleted / a.goal) * 100);
    return `
      <div class="knowledge-card">
        <div class="knowledge-card-top">
          <span class="knowledge-card-name">${a.name}</span>
          <span class="knowledge-card-status">${a.booksCompleted}/${a.goal} books</span>
        </div>
        <div class="knowledge-card-meta">Current book: ${a.currentBook}</div>
        <div class="progress-track"><div class="progress-fill" data-pct="${pct}"></div></div>
        <div class="knowledge-card-milestone">${a.booksCompleted} books completed in 2026 · Goal: ${a.goal} this year</div>
      </div>
    `;
  }
  return `
    <div class="knowledge-card">
      <div class="knowledge-card-top">
        <span class="knowledge-card-name">${a.name}</span>
        <span class="knowledge-card-status">${a.status}</span>
      </div>
      <div class="knowledge-card-milestone">Next step: <b>${a.nextStep}</b></div>
    </div>
  `;
}

/* ---------- Habit tracker — full 30 days ---------- */
function habitTracker30Block(items) {
  const labels = lastNDayLabels(items.length);
  return `
    <div class="habit-grid-30" id="habitTracker30">
      ${items.map((done, i) => `
        <div class="habit-cell-30">
          <span class="habit-day">${labels[i]}</span>
          <span class="habit-dot">${dotSvg(done ? "green" : "red", 11)}</span>
        </div>
      `).join("")}
    </div>
  `;
}

function placeholderBlock(text) {
  return `<div class="placeholder">${text}</div>`;
}

function chartBlock(id, short) {
  return `<div class="chart-wrap ${short ? "short" : ""}"><canvas id="${id}"></canvas></div>`;
}

/* =========================================================
   RENDER: PILLARS (always expanded, 2-column grid)
   ========================================================= */
const GRID_PILLAR_KEYS = ["physical", "capital", "brand", "build", "discipline", "spirit", "knowledge"];

function renderPillars() {
  const html = GRID_PILLAR_KEYS.map((key, i) => {
    const p = DATA.pillars.find(x => x.key === key);
    const sections = [];

    if (p.key === "physical") {
      const raceDate = new Date();
      raceDate.setDate(raceDate.getDate() + p.marathon.daysOut);
      const raceDateStr = raceDate.toLocaleDateString("en-AU", { weekday: "short", day: "numeric", month: "short", timeZone: "Australia/Brisbane" });
      const doneCount = p.trainingBlock.items.filter(s => s === "done").length;
      const currentCount = p.trainingBlock.items.filter(s => s === "current").length;
      const blockPct = Math.round(((doneCount + currentCount * 0.5) / p.trainingBlock.items.length) * 100);

      sections.push(heroGaugeBlock({
        percent: blockPct, color: COLOR.green, valueText: p.marathon.daysOut, sublabel: "days to go",
        title: p.marathon.name, sub: `${p.marathon.note} · ${raceDateStr}`, pace: p.marathon.paceInfo,
      }));
      sections.push(labeled(p.trainingBlock.label, segmentBlock(p.trainingBlock)));
      sections.push(labeled("Today", listRows([{ name: p.today.title, sub: p.today.sub, isCurrent: true }])));
      sections.push(labeled("Week 3 Schedule", weekTableBlock(p.weekSchedule)));
      sections.push(labeled("Weekly Training Volume (km)", chartBlock(`chart-${p.key}-volume`)));
      sections.push(labeled("Heart Rate Zones", listRows(p.heartRateZones.map(z => ({
        name: z.zone, dotColor: z.color, amount: z.range,
      })))));
    }

    if (p.key === "capital") {
      sections.push(statGrid(p.stats, 4));
      sections.push(labeled(p.revenueChart.label, chartBlock(`chart-${p.key}-revenue`)));
      sections.push(labeled(p.expenses.label, chartBlock(`chart-${p.key}-expenses`)));
      sections.push(labeled(p.bills.label, billsTableBlock(p.bills.items.map(b => ({
        name: b.name, due: b.due, amount: b.amount, overdue: b.overdue, dueToday: b.dueToday,
      })), "bills-capital")));
      sections.push(labeled(p.shopify.label, statGrid([
        { label: "Products listed", value: p.shopify.productsListed },
        { label: "Active products", value: p.shopify.activeProducts },
        { label: "Inventory units", value: p.shopify.inventoryUnits.toLocaleString() },
      ])));
    }

    if (p.key === "brand") {
      sections.push(statGrid([
        { label: p.contentSchedule.label, value: p.contentSchedule.value },
        { label: p.notion.label, value: p.notion.value, sub: p.notion.sub },
      ], 2));
      sections.push(labeled(p.contentPillars.label, listRows(p.contentPillars.items.map(name => ({
        name, dotColor: "blue",
      })))));
      sections.push(labeled(p.postingStatus.label, checkRows(p.postingStatus.items)));
    }

    if (p.key === "build") {
      sections.push(labeled(p.marketingPhases.label, segmentBlock(p.marketingPhases) + `<div class="progress-sub" style="margin-top:12px;">${p.marketingPhases.current}</div>`));
      sections.push(labeled(p.inventory.label, inventoryBlock(p.inventory.items)));
      sections.push(labeled(p.devProjects.label, listRows(p.devProjects.items.map(d => ({
        name: d.name, dotColor: d.color, amount: d.status,
      })))));
    }

    if (p.key === "discipline") {
      sections.push(statGrid(p.stats, 4));
      sections.push(labeled(p.tasksChart.label, chartBlock(`chart-${p.key}-tasks`)));
      sections.push(labeled(p.karmaChart.label, chartBlock(`chart-${p.key}-karma`)));
      sections.push(labeled(p.completionRateChart.label, chartBlock(`chart-${p.key}-completion`)));
      sections.push(labeled(p.habitTracker.label, habitTracker30Block(p.habitTracker.items)));
      sections.push(labeled(p.todoistTasks.label, checkRows(p.todoistTasks.items)));
    }

    if (p.key === "spirit") {
      const now = new Date();
      const brisbaneNow = new Date(now.toLocaleString("en-US", { timeZone: "Australia/Brisbane" }));
      const startOfYear = new Date(brisbaneNow.getFullYear(), 0, 0);
      const dayOfYear = Math.floor((brisbaneNow - startOfYear) / 86400000);
      const totalDays = p.readingPlan.totalDays;
      const yearPct = Math.round((dayOfYear / totalDays) * 100);

      sections.push(statGrid([
        { label: "Reading Plan", value: `Day ${dayOfYear}`, sub: `of ${totalDays} days` },
        { label: "Current Book", value: p.readingPlan.currentBook },
        { label: "Devotional Streak", value: `${p.devotionalStreak} day${p.devotionalStreak === 1 ? "" : "s"}`, dot: p.devotionalStreak > 0 ? "green" : "red" },
      ]));
      sections.push(progressRows([
        { name: "Bible Reading Plan — Year Progress", value: `Day ${dayOfYear} of ${totalDays}`, percent: yearPct },
      ]));
      sections.push(labeled("Today's Reading", listRows([
        { name: p.readingPlan.todaysReading, sub: p.readingPlan.currentBook, isCurrent: true },
      ])));
      sections.push(labeled("Verse of the Day", `
        <div class="verse-block">
          “${p.verse.text}”
          <div class="verse-ref">— ${p.verse.reference}</div>
        </div>
      `));
      sections.push(labeled("Reflection Notes", placeholderBlock(p.notes.placeholder)));
    }

    if (p.key === "knowledge") {
      const score = computeKnowledgeScore(p.areas);
      sections.push(heroGaugeBlock({
        percent: score, color: COLOR[p.color], valueText: `${score}%`, sublabel: "score",
        title: "Overall Knowledge Score", sub: "Based on language levels, reading progress, and goal milestones across all areas.",
        pace: `Learning hours this week: ${p.weeklyHours}`,
      }));
      sections.push(labeled("Learning Areas", `<div class="knowledge-grid">${p.areas.map(knowledgeAreaCard).join("")}</div>`));
    }

    return `
      <section class="pillar-card" id="pillar-${p.key}" style="animation-delay:${i * 0.05}s">
        <div class="pillar-header">
          <div class="pillar-icon" style="--icon-bg:${hexToRgba(COLOR[p.color], 0.06)}; --icon-fg:${COLOR[p.color]}">${svgIcon(p.icon, 24)}</div>
          ${circularGauge({ percent: p.score, size: 48, stroke: 4, color: COLOR[p.color], valueText: p.score, valueSize: 14 })}
          <div class="pillar-info">
            <div class="pillar-name">${p.name}</div>
            <div class="pillar-status" style="color:${COLOR[p.color]}">${p.status}</div>
          </div>
        </div>
        <div class="pillar-body">
          ${sections.join("")}
        </div>
      </section>
    `;
  }).join("");

  document.getElementById("pillars").innerHTML = html;

  animateGauges(document.getElementById("pillars"));

  // week schedule table interactivity
  const physical = DATA.pillars.find(p => p.key === "physical");
  setupWeekTable(physical.weekSchedule);

  // bills: tap to mark as paid
  setupBillsTable("bills-capital");
}

   ========================================================= */
function renderWhoop() {
  const w = DATA.whoop;
  let band, color;
  if (w.recovery >= 67) { band = "Recovered"; color = COLOR.green; }
  else if (w.recovery >= 34) { band = "Moderate"; color = COLOR.yellow; }
  else { band = "Low"; color = COLOR.red; }

  const strainPct = Math.min(100, (w.strain / w.strainMax) * 100);

  const hasTrend = w.recoveryTrend && w.recoveryTrend.length > 1;
  const trendHtml = hasTrend
    ? chartBlock("chart-whoop-trend", true)
    : `<div class="whoop-trend-placeholder">7-day recovery trend will appear here once more days are synced.</div>`;

  const card = document.getElementById("whoop-card");
  card.style.background = hexToRgba(color, 0.06);
  card.style.boxShadow = `inset 0 0 0 1px ${hexToRgba(color, 0.18)}, var(--shadow)`;

  card.innerHTML = `
    <div class="whoop-header">
      <div class="section-header">WHOOP</div>
      <div class="whoop-band" style="color:${color}">${band} · Synced ${w.date}</div>
    </div>
    <div class="whoop-main">
      <div class="whoop-gauges">
        ${circularGauge({ percent: w.recovery, size: 150, stroke: 14, color, valueText: `${w.recovery}%`, sublabel: "Recovery", valueSize: 34 })}
        ${circularGauge({ percent: w.sleep, size: 110, stroke: 10, color: COLOR.blue, valueText: `${w.sleep}%`, sublabel: "Sleep", valueSize: 24 })}
        ${circularGauge({ percent: strainPct, size: 110, stroke: 10, color: COLOR.purple, valueText: w.strain.toFixed(1), sublabel: "Strain /21", valueSize: 24 })}
      </div>
      <div class="whoop-side">
        <div class="stat-grid cols-2">
          <div class="stat-box">
            <div class="stat-label">HRV</div>
            <div class="stat-value">${w.hrv}ms</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Resting HR</div>
            <div class="stat-value">${w.restingHr} bpm</div>
          </div>
        </div>
        ${trendHtml}
      </div>
    </div>
  `;

  animateGauges(card);
}

let chartJsPromise = null;
function loadChartJs() {
  if (!chartJsPromise) {
    chartJsPromise = new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js";
      script.onload = () => {
        Chart.defaults.color = "#8A8279";
        Chart.defaults.font.family = "-apple-system, 'SF Pro Display', system-ui, sans-serif";
        Chart.defaults.font.size = 12;
        Chart.defaults.font.weight = "500";
        resolve();
      };
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }
  return chartJsPromise;
}

const TOOLTIP_STYLE = {
  backgroundColor: "#2C2825",
  titleColor: "#FAF8F5",
  bodyColor: "#FAF8F5",
  padding: 10,
  cornerRadius: 8,
};

function makeRevenueChart(canvasId, cfg) {
  const ctx = document.getElementById(canvasId).getContext("2d");
  const colors = cfg.data.map(v => v > 0 ? COLOR.green : "#EDEAE6");
  return new Chart(ctx, {
    type: "bar",
    data: {
      labels: cfg.labels,
      datasets: [{
        data: cfg.data,
        backgroundColor: colors,
        borderRadius: 8,
        maxBarThickness: 56,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { ...TOOLTIP_STYLE, callbacks: { label: (c) => `$${c.parsed.y}` } },
      },
      scales: {
        x: { grid: { display: false }, border: { display: false } },
        y: {
          grid: { color: "rgba(120,100,80,0.06)" },
          border: { display: false },
          ticks: { callback: (v) => `$${v}` },
          beginAtZero: true,
        },
      },
    },
  });
}

function lastNDayLabels(n) {
  const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  const today = new Date();
  const labels = [];
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    labels.push(days[d.getDay()]);
  }
  return labels;
}

function makeKarmaChart(canvasId, cfg) {
  const ctx = document.getElementById(canvasId).getContext("2d");
  const gradient = ctx.createLinearGradient(0, 0, 0, 220);
  gradient.addColorStop(0, hexToRgba(COLOR.blue, 0.18));
  gradient.addColorStop(1, hexToRgba(COLOR.blue, 0));

  const min = Math.min(...cfg.data);
  const max = Math.max(...cfg.data);
  const pad = Math.max(4, Math.round((max - min) * 0.4));

  return new Chart(ctx, {
    type: "line",
    data: {
      labels: lastNDayLabels(cfg.data.length),
      datasets: [{
        data: cfg.data,
        borderColor: COLOR.blue,
        backgroundColor: gradient,
        fill: true,
        tension: 0.35,
        pointRadius: 4,
        pointBackgroundColor: COLOR.blue,
        pointBorderColor: "#FFFFFF",
        pointBorderWidth: 1.5,
        borderWidth: 2.5,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: TOOLTIP_STYLE,
      },
      scales: {
        x: { grid: { display: false }, border: { display: false } },
        y: {
          grid: { color: "rgba(120,100,80,0.06)" },
          border: { display: false },
          min: min - pad,
          max: max + pad,
          ticks: { maxTicksLimit: 4 },
        },
      },
    },
  });
}

const goalLinePlugin = {
  id: "goalLine",
  afterDatasetsDraw(chart, args, opts) {
    if (!opts || opts.value == null) return;
    const { ctx, chartArea, scales } = chart;
    const y = scales.y.getPixelForValue(opts.value);
    if (y < chartArea.top || y > chartArea.bottom) return;
    ctx.save();
    ctx.strokeStyle = opts.color || "#8A8279";
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.moveTo(chartArea.left, y);
    ctx.lineTo(chartArea.right, y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = opts.color || "#8A8279";
    ctx.font = "600 11px -apple-system, sans-serif";
    ctx.textAlign = "right";
    ctx.fillText(opts.label || "", chartArea.right - 4, y - 6);
    ctx.restore();
  },
};

/* =========================================================
   LAZY-LOAD CHARTS — only fetch Chart.js + render once a
   chart scrolls into view
   ========================================================= */
function setupLazyCharts() {
  const physical = DATA.pillars.find(p => p.key === "physical");
  const capital = DATA.pillars.find(p => p.key === "capital");
  const discipline = DATA.pillars.find(p => p.key === "discipline");
  const whoop = DATA.whoop;

  const initializers = {
    "chart-capital-revenue": () => makeRevenueChart("chart-capital-revenue", capital.revenueChart),
    "chart-capital-expenses": () => makeExpenseDonut("chart-capital-expenses", capital.expenses),
    "chart-physical-volume": () => makeTrainingVolumeChart("chart-physical-volume", {
      label: physical.weekSchedule.label,
      today: physical.weekSchedule.today,
      days: physical.weekSchedule.items.map(it => it.day),
      data: physical.weekSchedule.items.map(it => it.km),
    }),
    "chart-discipline-tasks": () => makeTasksChart("chart-discipline-tasks", discipline.tasksChart),
    "chart-discipline-karma": () => makeKarmaChart("chart-discipline-karma", discipline.karmaChart),
    "chart-discipline-completion": () => makeCompletionRateChart("chart-discipline-completion", discipline.completionRateChart),
  };

  if (whoop.recoveryTrend && whoop.recoveryTrend.length > 1) {
    initializers["chart-whoop-trend"] = () => makeRecoveryTrendChart("chart-whoop-trend", whoop.recoveryTrend);
  }

  const observer = new IntersectionObserver((entries, obs) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const init = initializers[entry.target.dataset.chartId];
      if (init) loadChartJs().then(init);
      obs.unobserve(entry.target);
    });
  }, { rootMargin: "200px" });

  Object.keys(initializers).forEach(id => {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const wrap = canvas.closest(".chart-wrap") || canvas;
    wrap.dataset.chartId = id;
    observer.observe(wrap);
  });
}

/* =========================================================
   FLOATING CLAUDE CHAT
   ========================================================= */
function setupChat() {
  const fab = document.getElementById("chatFab");
  const bar = document.getElementById("chatBar");
  const input = document.getElementById("chatInput");

  fab.innerHTML = svgIcon("chat", 24, 1.8);
  document.getElementById("chatSend").innerHTML = svgIcon("send", 18, 2);
  document.getElementById("chatClose").innerHTML = svgIcon("close", 18, 2);

  function openBar() {
    bar.classList.add("open");
    fab.classList.add("hidden");
    input.focus();
  }
  function closeBar() {
    bar.classList.remove("open");
    fab.classList.remove("hidden");
  }
  function send() {
    const msg = input.value.trim();
    if (!msg) return;
    const prefixed = `Context: I'm Christian, checking my life dashboard. ${msg}`;
    window.open(`https://claude.ai/new?q=${encodeURIComponent(prefixed)}`, "_blank");
    input.value = "";
  }

  fab.addEventListener("click", openBar);
  document.getElementById("chatClose").addEventListener("click", closeBar);
  document.getElementById("chatSend").addEventListener("click", send);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") send();
  });
}
