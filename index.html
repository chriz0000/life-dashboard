  :root {
    --bg: #0a0a0b;
    --card: #141416;
    --stat: #1c1c1f;
    --text: #e8e8ec;
    --text-2: #a0a0a8;
    --text-3: #68686f;
    --red: #E24B4A;
    --amber: #EF9F27;
    --green: #1D9E75;
    --blue: #378ADD;
    --purple: #7F77DD;
    --border: rgba(255,255,255,0.05);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { background: var(--bg); }

  body {
    font-family: -apple-system, "SF Pro Display", system-ui, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app {
    max-width: 420px;
    margin: 0 auto;
    padding: 20px 16px 48px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* ---------- Hero ---------- */
  .hero {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 4px 2px 6px;
    animation: fadeUp 0.5s ease both;
  }
  .ring-wrap { position: relative; width: 78px; height: 78px; flex-shrink: 0; }
  .level-ring { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--stat); stroke-width: 7; }
  .ring-fg {
    fill: none; stroke: var(--purple); stroke-width: 7; stroke-linecap: round;
    stroke-dasharray: 263.9; stroke-dashoffset: 263.9;
    transition: stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1) 0.2s;
  }
  .ring-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .ring-level { font-size: 23px; font-weight: 800; line-height: 1; letter-spacing: -0.5px; }
  .ring-tag { font-size: 9px; letter-spacing: 1.5px; color: var(--text-3); font-weight: 700; margin-top: 3px; }

  .hero-info { flex: 1; min-width: 0; }
  .hero-name { font-size: 21px; font-weight: 800; letter-spacing: -0.3px; }
  .hero-title {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12.5px; color: var(--purple); font-weight: 700; margin-top: 4px;
  }
  .hero-meta { font-size: 12px; color: var(--text-3); margin-top: 6px; }
  .hero-xp { font-size: 11px; color: var(--text-3); margin-top: 2px; font-weight: 600; }

  /* ---------- Alerts ---------- */
  .alerts { display: flex; flex-direction: column; gap: 6px; }
  .alert {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border-radius: 10px; padding: 11px 13px;
    font-size: 12.5px; color: var(--text-2); line-height: 1.35;
    border-left: 3px solid var(--c);
    animation: fadeUp 0.5s ease both;
  }
  .alert-icon { display: flex; flex-shrink: 0; line-height: 1; }

  /* ---------- Today's schedule ---------- */
  .schedule-card {
    background: var(--card); border-radius: 16px; padding: 14px 16px;
    border: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 12px;
    animation: fadeUp 0.5s ease both;
  }
  .schedule-title { font-size: 10.5px; color: var(--text-3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
  .day-bar { display: flex; gap: 4px; }
  .day-cell {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
    padding: 8px 0; border-radius: 10px; background: var(--stat);
    font-size: 11px; font-weight: 700; color: var(--text-2);
  }
  .day-cell.is-today { background: rgba(127,119,221,0.18); color: var(--purple); }
  .timeline { display: flex; flex-direction: column; gap: 12px; }
  .timeline-row { display: flex; gap: 12px; align-items: flex-start; }
  .timeline-time { font-size: 11px; color: var(--text-3); font-weight: 700; width: 56px; flex-shrink: 0; padding-top: 2px; }
  .timeline-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .timeline-content { flex: 1; min-width: 0; }
  .timeline-title { font-size: 13px; font-weight: 700; }
  .timeline-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; font-weight: 600; }
  .alert b { color: var(--text); font-weight: 700; }

  /* ---------- Quick nav ---------- */
  .quicknav {
    display: flex; gap: 8px; overflow-x: auto; padding: 2px 2px 4px;
    -ms-overflow-style: none; scrollbar-width: none;
  }
  .quicknav::-webkit-scrollbar { display: none; }
  .nav-pill {
    flex-shrink: 0; display: flex; align-items: center; gap: 6px;
    background: var(--card); border: 1px solid var(--border); border-radius: 22px;
    padding: 9px 15px; font-size: 12px; font-weight: 700; color: var(--text-2);
    white-space: nowrap; transition: transform .15s ease, background .15s ease;
    -webkit-user-select: none; user-select: none;
  }
  .nav-pill:active { transform: scale(0.94); background: var(--stat); }
  .nav-icon { display: flex; }
  .nav-dot { width: 6px; height: 6px; border-radius: 50%; margin-left: 2px; }

  /* ---------- Pillar cards ---------- */
  .pillar {
    background: var(--card); border-radius: 16px; overflow: hidden;
    border: 1px solid var(--border);
    animation: fadeUp 0.5s ease both;
  }
  .pillar-header {
    display: flex; align-items: center; gap: 12px; padding: 15px 16px;
    cursor: pointer; -webkit-user-select: none; user-select: none;
    transition: background .15s ease;
  }
  .pillar-header:active { background: rgba(255,255,255,0.02); }
  .pillar-icon {
    width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    background: var(--icon-bg);
  }
  .pillar-meta { flex: 1; min-width: 0; }
  .pillar-top-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .pillar-name { font-size: 15px; font-weight: 800; letter-spacing: -0.2px; }
  .pillar-status {
    font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 6px;
    background: var(--badge-bg); color: var(--badge-fg); white-space: nowrap;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .pillar-xp-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .pillar-xp-bar { flex: 1; height: 4px; background: var(--stat); border-radius: 2px; overflow: hidden; }
  .pillar-xp-fill {
    height: 100%; border-radius: 2px; width: 0%; background: var(--fill);
    transition: width 1.1s cubic-bezier(.4,0,.2,1) 0.15s;
  }
  .pillar-xp-pct { font-size: 11px; color: var(--text-3); font-weight: 700; flex-shrink: 0; min-width: 30px; text-align: right; }

  .chevron {
    width: 18px; height: 18px; flex-shrink: 0; color: var(--text-3);
    transition: transform .35s cubic-bezier(.4,0,.2,1);
  }
  .pillar.expanded .chevron { transform: rotate(180deg); }

  .pillar-body-wrap {
    display: grid; grid-template-rows: 0fr;
    transition: grid-template-rows .4s cubic-bezier(.4,0,.2,1);
  }
  .pillar.expanded .pillar-body-wrap { grid-template-rows: 1fr; }
  .pillar-body { overflow: hidden; min-height: 0; }
  .pillar-body-inner {
    padding: 2px 16px 18px;
    display: flex; flex-direction: column; gap: 14px;
  }

  .section-label {
    font-size: 10.5px; color: var(--text-3); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: -4px;
  }

  /* Stat grid */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-box { background: var(--stat); border-radius: 10px; padding: 10px 12px; }
  .stat-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700; }
  .stat-value { font-size: 16px; font-weight: 800; margin-top: 5px; letter-spacing: -0.2px; display: flex; align-items: center; gap: 6px; }
  .stat-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--dot); }

  /* Segments (training blocks / phases) */
  .segments { display: flex; gap: 4px; }
  .segment { flex: 1; height: 9px; border-radius: 4px; background: var(--stat); position: relative; }
  .segment.done { background: var(--green); }
  .segment.current { background: var(--purple); box-shadow: 0 0 0 3px rgba(127,119,221,0.18); }
  .segment.active { background: var(--amber); animation: pulseSeg 2s ease-in-out infinite; }
  .segment-labels { display: flex; justify-content: space-between; font-size: 9.5px; color: var(--text-3); margin-top: 7px; font-weight: 600; }
  @keyframes pulseSeg { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }

  /* Lists (bills, subs) */
  .list { display: flex; flex-direction: column; gap: 8px; }
  .list-row { display: flex; align-items: center; justify-content: space-between; background: var(--stat); border-radius: 10px; padding: 11px 13px; border: 1px solid transparent; }
  .list-row.is-today { border-color: var(--purple); background: rgba(127,119,221,0.08); }
  .list-main { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .list-name { font-size: 13px; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; }
  .list-sub { font-size: 11px; color: var(--text-3); font-weight: 600; }
  .list-sub.is-overdue { color: var(--red); }
  .list-amount { font-size: 14.5px; font-weight: 800; flex-shrink: 0; padding-left: 10px; }
  .list-amount.is-overdue { color: var(--red); }

  /* Habit tracker */
  .habit-row { display: flex; justify-content: space-between; background: var(--stat); border-radius: 10px; padding: 12px 10px; }
  .habit-cell { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .habit-day { font-size: 9.5px; color: var(--text-3); font-weight: 700; text-transform: uppercase; }

  /* Quest list */
  .quest-row { display: flex; align-items: center; gap: 11px; background: var(--stat); border-radius: 10px; padding: 11px 13px; }
  .quest-icon {
    width: 21px; height: 21px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800;
  }
  .quest-text { font-size: 13px; font-weight: 600; }

  /* Inventory grid */
  .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .inv-box { background: var(--stat); border-radius: 10px; padding: 10px 12px; }
  .inv-name { font-size: 11px; color: var(--text-2); font-weight: 600; }
  .inv-units { font-size: 19px; font-weight: 800; margin-top: 5px; letter-spacing: -0.3px; }
  .inv-units span { font-size: 11px; color: var(--text-3); font-weight: 600; margin-left: 3px; }

  /* Dev project rows */
  .dev-row { display: flex; align-items: center; gap: 11px; background: var(--stat); border-radius: 10px; padding: 11px 13px; }
  .dev-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .dev-name { font-size: 13px; font-weight: 700; flex: 1; }
  .dev-status { font-size: 11px; color: var(--text-3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }

  /* Chart containers */
  .chart-wrap { background: var(--stat); border-radius: 10px; padding: 12px 12px 8px; height: 170px; position: relative; }
  .chart-wrap canvas { max-height: 100% !important; }

  /* Integration / subscription cards */
  .integ-card {
    background: var(--card); border-radius: 16px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    border: 1px solid var(--border);
    animation: fadeUp 0.5s ease both;
  }
  .integ-icon {
    width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    background: var(--stat);
  }
  .integ-info { flex: 1; min-width: 0; }
  .integ-title { font-size: 13.5px; font-weight: 800; }
  .integ-sub { font-size: 11.5px; color: var(--text-3); margin-top: 3px; font-weight: 600; }
  .integ-badge {
    font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 7px;
    background: var(--badge-bg); color: var(--badge-fg); white-space: nowrap;
    text-transform: uppercase; letter-spacing: 0.4px;
  }

  .subs-card {
    background: var(--card); border-radius: 16px; padding: 14px 16px;
    border: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
    animation: fadeUp 0.5s ease both;
  }
  .subs-title { font-size: 10.5px; color: var(--text-3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }

  /* Footer */
  .footer {
    text-align: center; padding-top: 6px; display: flex; flex-direction: column; gap: 5px;
    animation: fadeUp 0.5s ease both;
  }
  .footer-updated { font-size: 11px; color: var(--text-3); font-weight: 600; }
  .footer-sources { font-size: 10.5px; color: var(--text-3); opacity: 0.6; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

/* =========================================================

const COLOR = {
  red: "#E24B4A",
  amber: "#EF9F27",
  green: "#1D9E75",
  blue: "#378ADD",
  purple: "#7F77DD",
  gray: "#68686f",
  teal: "#14B8A6",
};

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function badgeStyle(colorKey) {
  const hex = COLOR[colorKey] || COLOR.gray;
  return `background:${hexToRgba(hex, 0.16)}; color:${hex};`;
}

function svgIcon(name, size = 18) {
  return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${ICON_PATHS[name] || ""}</svg>`;

function dotSvg(colorKey, size = 8) {
  const c = COLOR[colorKey] || COLOR.gray;
  return `<svg width="${size}" height="${size}" viewBox="0 0 8 8" style="flex-shrink:0"><circle cx="4" cy="4" r="4" fill="${c}"/></svg>`;

function renderHero() {
  const u = DATA.user;
  const avgXp = Math.round(DATA.pillars.reduce((s, p) => s + p.xp, 0) / DATA.pillars.length);
  const circumference = 2 * Math.PI * 42; // r=42

  const now = new Date();
  const dateStr = now.toLocaleDateString("en-AU", {
    weekday: "short", day: "numeric", month: "short", timeZone: "Australia/Brisbane",
  });

  document.getElementById("hero").innerHTML = `
    <div class="ring-wrap">
      <svg class="level-ring" viewBox="0 0 100 100">
        <circle class="ring-bg" cx="50" cy="50" r="42"/>
        <circle class="ring-fg" id="ringFg" cx="50" cy="50" r="42"
          style="stroke-dasharray:${circumference.toFixed(2)}; stroke-dashoffset:${circumference.toFixed(2)};"/>
      </svg>
      <div class="ring-center">
        <span class="ring-level">${u.level}</span>
        <span class="ring-tag">LEVEL</span>
      </div>
    </div>
    <div class="hero-info">
      <div class="hero-name">${u.name}</div>
      <div class="hero-title">${svgIcon("star", 13)} ${u.title}</div>
      <div class="hero-meta">${dateStr} · ${u.location}</div>
      <div class="hero-xp">${avgXp}% to Level ${u.level + 1}</div>

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const offset = circumference - (circumference * avgXp) / 100;
      document.getElementById("ringFg").style.strokeDashoffset = offset.toFixed(2);
    });
  });
}

function renderPillars() {
  const html = DATA.pillars.map((p, i) => {
    const sections = [];
    if (p.stats) sections.push(statGrid(p.stats));
    if (p.segments) sections.push(segmentBlock(p.segments));
    if (p.weekSchedule) sections.push(weekScheduleBlock(p.weekSchedule));
    if (p.heartRateZones) sections.push(hrZonesBlock(p.heartRateZones));
    if (p.whoop) sections.push(labeledSection(p.whoop.label, statGrid(p.whoop.items)));
    if (p.bills) sections.push(billsBlock(p.bills));
    if (p.chart) sections.push(chartBlock(`chart-${p.key}`, p.chart.label));
    if (p.shopify) sections.push(shopifyBlock(p.shopify));
    if (p.expenseBreakdown) sections.push(expenseBlock(p.expenseBreakdown));
    if (p.quests) sections.push(questsBlock(p.quests));
    if (p.inventory) sections.push(inventoryBlock(p.inventory));
    if (p.devProjects) sections.push(devProjectsBlock(p.devProjects));
    if (p.todoistTasks) sections.push(todoistBlock(p.todoistTasks));
    if (p.karmaChart) sections.push(chartBlock(`chart-${p.key}-karma`, p.karmaChart.label));
    if (p.tasksChart) sections.push(chartBlock(`chart-${p.key}-tasks`, p.tasksChart.label));
    if (p.habitTracker) sections.push(habitTrackerBlock(p.habitTracker));

    return `
      <section class="pillar" id="pillar-${p.key}" style="animation-delay:${i * 0.06}s">
        <div class="pillar-header" data-key="${p.key}">
          <div class="pillar-icon" style="--icon-bg:${hexToRgba(COLOR[p.color], 0.15)}; color:${COLOR[p.color]}">${svgIcon(p.icon, 20)}</div>
          <div class="pillar-meta">
            <div class="pillar-top-row">
              <span class="pillar-name">${p.name}</span>
              <span class="pillar-status" style="${badgeStyle(p.color)}">${p.status}</span>
            </div>
            <div class="pillar-xp-row">
              <div class="pillar-xp-bar"><div class="pillar-xp-fill" data-xp="${p.xp}" style="--fill:${COLOR[p.color]}"></div></div>
              <span class="pillar-xp-pct">${p.xp}% XP</span>
            </div>
          </div>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>

          <div class="pillar-body">
            <div class="pillar-body-inner">
              ${sections.join("")}

          </div>

    `;
  }).join("");

  document.getElementById("pillars").innerHTML = html;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll(".pillar-xp-fill").forEach(el => {
        el.style.width = `${el.dataset.xp}%`;
      });
    });
  });

  // expand / collapse
  document.querySelectorAll(".pillar-header").forEach(header => {
    header.addEventListener("click", () => togglePillar(header.closest(".pillar")));
  });
}

const chartInstances = {};

function togglePillar(pillarEl) {
  const wasExpanded = pillarEl.classList.contains("expanded");
  pillarEl.classList.toggle("expanded");

  if (!wasExpanded) {
    const key = pillarEl.querySelector(".pillar-header").dataset.key;
    // lazy-init charts after the expand transition starts
    setTimeout(() => initChartsFor(key), 80);
  }
}

function initChartsFor(key) {
  const p = DATA.pillars.find(x => x.key === key);
  if (!p) return;

  if (p.chart && !chartInstances[`chart-${key}`]) {
    chartInstances[`chart-${key}`] = makeRevenueChart(`chart-${key}`, p.chart);
  }
  if (p.karmaChart && !chartInstances[`chart-${key}-karma`]) {
    chartInstances[`chart-${key}-karma`] = makeKarmaChart(`chart-${key}-karma`, p.karmaChart);
  }
  if (p.tasksChart && !chartInstances[`chart-${key}-tasks`]) {
    chartInstances[`chart-${key}-tasks`] = makeTasksChart(`chart-${key}-tasks`, p.tasksChart);
  }
}

/* =========================================================
   CHARTS
   ========================================================= */
Chart.defaults.color = "#68686f";
Chart.defaults.font.family = "-apple-system, 'SF Pro Display', system-ui, sans-serif";
Chart.defaults.font.size = 11;
Chart.defaults.font.weight = "600";

function makeRevenueChart(canvasId, cfg) {
  const ctx = document.getElementById(canvasId).getContext("2d");
  const colors = cfg.data.map(v => v > 0 ? COLOR.green : "#2a2a2e");
  return new Chart(ctx, {
    type: "bar",
    data: {
      labels: cfg.labels,
      datasets: [{
        data: cfg.data,
        backgroundColor: colors,
        borderRadius: 6,
        maxBarThickness: 36,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#1c1c1f",
          titleColor: "#e8e8ec",
          bodyColor: "#e8e8ec",
          padding: 8,
          cornerRadius: 8,
          callbacks: { label: (c) => `$${c.parsed.y}` },
        },
      },
      scales: {
        x: { grid: { display: false }, border: { display: false } },
        y: {
          grid: { color: "rgba(255,255,255,0.04)" },
          border: { display: false },
          ticks: { callback: (v) => `$${v}` },
          beginAtZero: true,
        },
      },
    },
  });
}

function lastNDayLabels(n) {
  const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  const today = new Date();
  const labels = [];
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    labels.push(days[d.getDay()]);
  }
  return labels;
}

function makeKarmaChart(canvasId, cfg) {
  const ctx = document.getElementById(canvasId).getContext("2d");
  const gradient = ctx.createLinearGradient(0, 0, 0, 150);
  gradient.addColorStop(0, hexToRgba(COLOR.blue, 0.25));
  gradient.addColorStop(1, hexToRgba(COLOR.blue, 0));

  const min = Math.min(...cfg.data);
  const max = Math.max(...cfg.data);
  const pad = Math.max(4, Math.round((max - min) * 0.4));

  return new Chart(ctx, {
    type: "line",
    data: {
      labels: lastNDayLabels(cfg.data.length),
      datasets: [{
        data: cfg.data,
        borderColor: COLOR.blue,
        backgroundColor: gradient,
        fill: true,
        tension: 0.35,
        pointRadius: 3,
        pointBackgroundColor: COLOR.blue,
        pointBorderColor: "#0a0a0b",
        pointBorderWidth: 1.5,
        borderWidth: 2.5,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#1c1c1f",
          titleColor: "#e8e8ec",
          bodyColor: "#e8e8ec",
          padding: 8,
          cornerRadius: 8,
        },
      },
      scales: {
        x: { grid: { display: false }, border: { display: false } },
        y: {
          grid: { color: "rgba(255,255,255,0.04)" },
          border: { display: false },
          min: min - pad,
          max: max + pad,
          ticks: { maxTicksLimit: 4 },
        },
      },
    },
  });
}

const goalLinePlugin = {
  id: "goalLine",
  afterDatasetsDraw(chart, args, opts) {
    if (!opts || opts.value == null) return;
    const { ctx, chartArea, scales } = chart;
    const y = scales.y.getPixelForValue(opts.value);
    if (y < chartArea.top || y > chartArea.bottom) return;
    ctx.save();
    ctx.strokeStyle = opts.color || "#68686f";
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.moveTo(chartArea.left, y);
    ctx.lineTo(chartArea.right, y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = opts.color || "#68686f";
    ctx.font = "700 10px -apple-system, sans-serif";
    ctx.textAlign = "right";
    ctx.fillText(opts.label || "", chartArea.right - 4, y - 6);
    ctx.restore();
  },
};

function makeTasksChart(canvasId, cfg) {
  const ctx = document.getElementById(canvasId).getContext("2d");
  return new Chart(ctx, {
    type: "bar",
    data: {
      labels: lastNDayLabels(cfg.data.length),
      datasets: [{
        data: cfg.data,
        backgroundColor: COLOR.purple,
        borderRadius: 6,
        maxBarThickness: 28,
      }],
    },
    plugins: [goalLinePlugin],
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#1c1c1f",
          titleColor: "#e8e8ec",
          bodyColor: "#e8e8ec",
          padding: 8,
          cornerRadius: 8,
        },
        goalLine: { value: cfg.goal, color: "#68686f", label: `Goal ${cfg.goal}` },
      },
      scales: {
        x: { grid: { display: false }, border: { display: false } },
        y: {
          grid: { color: "rgba(255,255,255,0.04)" },
          border: { display: false },
          beginAtZero: true,
          max: Math.max(cfg.goal * 1.15, Math.max(...cfg.data) * 1.4),
          ticks: { maxTicksLimit: 4 },
        },
      },
    },
  });
}

/* =========================================================
   RENDER: INTEGRATIONS (Gmail, Notion, Subscriptions)
   ========================================================= */
function renderIntegrations() {
  const e = DATA.emailAccounts;
  const n = DATA.notion;
  const w = DATA.whoopCard;

  const emailAccountsHtml = `
    <div class="subs-card">
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <div class="subs-title" style="display:inline-flex; align-items:center; gap:7px;">
          <span style="color:${COLOR.blue}; display:flex;">${svgIcon("mail", 14)}</span>${e.label}
        </div>
        <span class="integ-badge" style="${badgeStyle(e.badgeColor)}">${e.badge}</span>
      </div>
      <div class="list">
        ${e.accounts.map(a => `
          <div class="list-row">
            <div class="list-main">
              <span class="list-name">${dotSvg(a.color)}${a.name}</span>
              <span class="list-sub">${a.email}</span>
            </div>
            <span class="list-amount">${a.count != null ? a.count.toLocaleString() : "—"}</span>
          </div>
        `).join("")}
      </div>
    </div>
  `;

  const whoopHtml = `
    <div class="integ-card">
      <div class="integ-icon" style="color:${COLOR.teal}; background:${hexToRgba(COLOR.teal, 0.14)}">${svgIcon("whoop", 20)}</div>
      <div class="integ-info">
        <div class="integ-title">Recovery ${w.recovery} · Sleep ${w.sleep} · Strain ${w.strain}</div>
        <div class="integ-sub">${w.note}</div>
      </div>
      <span class="integ-badge" style="background:${hexToRgba(COLOR.teal, 0.16)}; color:${COLOR.teal}">WHOOP</span>
    </div>
  `;

  const notionHtml = `
    <div class="integ-card">
      <div class="integ-icon" style="color:${COLOR.green}">${svgIcon("doc", 20)}</div>
      <div class="integ-info">
        <div class="integ-title">${n.title}</div>
        <div class="integ-sub">${n.sub}</div>
      </div>
      <span class="integ-badge" style="${badgeStyle(n.badgeColor)}">${n.badge}</span>
    </div>
  `;

  const subsHtml = `
    <div class="subs-card">
      <div class="subs-title">Subscriptions</div>
      <div class="list">
        ${DATA.subscriptions.map(s => `
          <div class="list-row">
            <div class="list-main">
              <span class="list-name">${dotSvg(s.overdue ? "red" : "gray")}${s.name}</span>
              <span class="list-sub ${s.overdue ? "is-overdue" : ""}">${s.due}</span>
            </div>
            <span class="list-amount ${s.overdue ? "is-overdue" : ""}">${s.amount}</span>
          </div>
        `).join("")}
      </div>
    </div>
  `;

  document.getElementById("integrations").innerHTML = emailAccountsHtml + whoopHtml + notionHtml + subsHtml;
}

/* =========================================================
   RENDER: FOOTER
   ========================================================= */
function renderFooter() {
  const now = new Date();
  const stamp = now.toLocaleString("en-AU", {
    weekday: "short", day: "numeric", month: "short",
    hour: "numeric", minute: "2-digit",
    timeZone: "Australia/Brisbane",
  });
  document.getElementById("footer").innerHTML = `
    <div class="footer-updated">Last updated ${stamp} (Brisbane)</div>
    <div class="footer-sources">${DATA.meta.sources}</div>
  `;
}

   INIT
   ========================================================= */
renderHero();
renderAlerts();
renderQuickNav();
renderSchedule();
renderPillars();
renderIntegrations();
renderFooter();

const firstPillar = document.getElementById(`pillar-${DATA.pillars[0].key}`);
if (firstPillar) {
  togglePillar(firstPillar);
}

// register service worker
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js?v=" + Date.now()).catch(() => {});
  });
}
