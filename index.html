<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Life Dashboard</title>
<meta name="description" content="Christian's life dashboard" />

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#FAF8F5" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Dashboard" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" type="image/png" />

<style>
  :root {
    --bg: #FAF8F5;
    --card: #FFFFFF;
    --text: #2C2825;
    --text-2: #8A8279;
    --text-3: #B5AFA8;
    --blue: #5B8DB8;
    --green: #5B9A6F;
    --orange: #C68B4B;
    --red: #C45C4A;
    --purple: #8B7BB5;
    --track: #EDEAE6;
    --well: #F5F2EE;
    --separator: rgba(120,100,80,0.08);
    --shadow: 0 1px 3px rgba(120,100,80,0.06), 0 1px 2px rgba(120,100,80,0.03);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { background: var(--bg); }

  body {
    font-family: -apple-system, "SF Pro Display", "SF Pro Text", system-ui, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 48px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ---------- Header ---------- */
  .header {
    display: flex; flex-direction: column; gap: 4px;
    padding: 4px 4px 0;
    animation: fadeUp 0.5s ease both;
  }
  .greeting { font-size: 24px; font-weight: 600; letter-spacing: -0.3px; }
  .date { font-size: 15px; color: var(--text-2); }
  .life-score { margin-top: 12px; display: flex; flex-direction: column; gap: 7px; }
  .life-score-row { display: flex; justify-content: space-between; align-items: baseline; }
  .life-score-label { font-size: 13px; color: var(--text-2); font-weight: 500; }
  .life-score-value { font-size: 13px; color: var(--text); font-weight: 600; }
  .life-score-track { height: 4px; background: var(--track); border-radius: 2px; overflow: hidden; }
  .life-score-fill {
    height: 100%; border-radius: 2px; width: 0%; background: var(--blue);
    transition: width 1.2s cubic-bezier(.4,0,.2,1) 0.2s;
  }

  /* ---------- Sections ---------- */
  .section { display: flex; flex-direction: column; gap: 10px; animation: fadeUp 0.5s ease both; }
  .section-header, .subsection-label {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-2);
  }
  .section-header { padding-left: 4px; }
  .subsection-label { margin-bottom: 8px; }

  /* ---------- Card ---------- */
  .card { background: var(--card); border-radius: 16px; padding: 16px; box-shadow: var(--shadow); }

  /* ---------- Focus list ---------- */
  .focus-list { display: flex; flex-direction: column; }
  .focus-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 11px 0; border-bottom: 1px solid var(--separator);
  }
  .focus-item:first-child { padding-top: 0; }
  .focus-item:last-child { border-bottom: none; padding-bottom: 0; }
  .focus-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .focus-num { font-size: 13px; color: var(--text-3); font-weight: 600; flex-shrink: 0; width: 18px; }
  .focus-text { font-size: 15px; font-weight: 400; line-height: 1.4; }

  /* ---------- Email list ---------- */
  .email-list { display: flex; flex-direction: column; }
  .email-row {
    display: flex; flex-direction: column; gap: 3px;
    padding: 11px 0; border-bottom: 1px solid var(--separator);
  }
  .email-row:first-child { padding-top: 0; }
  .email-row:last-child { border-bottom: none; padding-bottom: 0; }
  .email-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .email-sender { font-size: 15px; font-weight: 600; letter-spacing: -0.1px; }
  .email-time { font-size: 13px; color: var(--text-3); flex-shrink: 0; font-weight: 400; }
  .email-subject {
    font-size: 13px; color: var(--text-2); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }

  /* ---------- Pillars ---------- */
  .pillars { display: flex; flex-direction: column; gap: 12px; }
  .pillar-card { background: var(--card); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); animation: fadeUp 0.5s ease both; }
  .pillar-header {
    display: flex; align-items: center; gap: 12px; padding: 16px;
    cursor: pointer; -webkit-user-select: none; user-select: none;
  }
  .pillar-icon {
    width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--icon-bg); color: var(--icon-fg);
  }
  .pillar-info { flex: 1; min-width: 0; }
  .pillar-name-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .pillar-name { font-size: 15px; font-weight: 600; letter-spacing: -0.1px; }
  .pillar-status { font-size: 13px; font-weight: 500; flex-shrink: 0; }
  .pillar-progress { display: flex; align-items: center; gap: 8px; margin-top: 9px; }
  .pillar-progress-track { flex: 1; height: 4px; background: var(--track); border-radius: 2px; overflow: hidden; }
  .pillar-progress-fill {
    height: 100%; border-radius: 2px; width: 0%; background: var(--fill);
    transition: width 1.1s cubic-bezier(.4,0,.2,1) 0.15s;
  }
  .pillar-progress-pct { font-size: 12px; color: var(--text-3); font-weight: 600; flex-shrink: 0; min-width: 30px; text-align: right; }

  .chevron {
    width: 18px; height: 18px; flex-shrink: 0; color: var(--text-3);
    transition: transform .35s cubic-bezier(.4,0,.2,1);
  }
  .pillar-card.expanded .chevron { transform: rotate(180deg); }

  .pillar-body-wrap {
    display: grid; grid-template-rows: 0fr;
    transition: grid-template-rows .4s cubic-bezier(.4,0,.2,1);
  }
  .pillar-card.expanded .pillar-body-wrap { grid-template-rows: 1fr; }
  .pillar-body { overflow: hidden; min-height: 0; }
  .pillar-body-inner {
    padding: 16px 16px 16px; border-top: 1px solid var(--separator);
    display: flex; flex-direction: column; gap: 16px;
  }

  /* ---------- Stat grid ---------- */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-box { background: var(--well); border-radius: 12px; padding: 12px; }
  .stat-label { font-size: 11px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .stat-value { font-size: 20px; font-weight: 600; margin-top: 6px; letter-spacing: -0.3px; display: flex; align-items: center; gap: 6px; }
  .stat-sub { font-size: 12px; color: var(--text-3); margin-top: 3px; }

  /* ---------- Hero stat (countdowns) ---------- */
  .hero-stat { background: var(--well); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; }
  .hero-stat-label { font-size: 13px; color: var(--text-2); font-weight: 500; }
  .hero-stat-value { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; margin-top: 6px; }
  .hero-stat-sub { font-size: 13px; color: var(--text-3); margin-top: 4px; }

  /* ---------- Segments (training / phases) ---------- */
  .segments { display: flex; gap: 4px; }
  .segment { flex: 1; height: 8px; border-radius: 4px; background: var(--track); }
  .segment.done { background: var(--green); }
  .segment.current { background: var(--blue); }
  .segment.active { background: var(--orange); animation: pulseSeg 2s ease-in-out infinite; }
  .segment-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-3); margin-top: 7px; font-weight: 500; }
  @keyframes pulseSeg { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ---------- Lists ---------- */
  .list { display: flex; flex-direction: column; gap: 8px; }
  .list-row { display: flex; align-items: center; justify-content: space-between; background: var(--well); border-radius: 12px; padding: 12px 14px; }
  .list-row.is-current { box-shadow: inset 0 0 0 1.5px var(--blue); }
  .list-main { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .list-name { font-size: 15px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; }
  .list-sub { font-size: 12px; color: var(--text-3); }
  .list-sub.is-overdue { color: var(--red); }
  .list-sub.is-due-today { color: var(--orange); }
  .list-amount { font-size: 15px; font-weight: 600; flex-shrink: 0; padding-left: 10px; }
  .list-amount.is-overdue { color: var(--red); }
  .list-amount.is-due-today { color: var(--orange); }

  /* ---------- Generic dot ---------- */
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ---------- Progress rows (knowledge) ---------- */
  .progress-rows { display: flex; flex-direction: column; gap: 16px; }
  .progress-row-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; gap: 8px; }
  .progress-name { font-size: 15px; font-weight: 500; }
  .progress-value { font-size: 13px; color: var(--text-2); flex-shrink: 0; text-align: right; }
  .progress-track { height: 6px; background: var(--track); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; width: 0%; background: var(--blue); transition: width 1.1s cubic-bezier(.4,0,.2,1) 0.15s; }
  .progress-sub { font-size: 12px; color: var(--text-3); margin-top: 6px; }

  /* ---------- Habit tracker ---------- */
  .habit-row { display: flex; justify-content: space-between; background: var(--well); border-radius: 12px; padding: 14px 10px; }
  .habit-cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .habit-day { font-size: 11px; color: var(--text-3); font-weight: 600; text-transform: uppercase; }

  /* ---------- Check rows (quests / tasks) ---------- */
  .check-row { display: flex; align-items: center; gap: 11px; background: var(--well); border-radius: 12px; padding: 12px 14px; }
  .check-icon {
    width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .check-text { font-size: 14px; font-weight: 500; }

  /* ---------- Inventory grid ---------- */
  .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .inv-box { background: var(--well); border-radius: 12px; padding: 12px; }
  .inv-name { font-size: 12px; color: var(--text-2); font-weight: 500; }
  .inv-units { font-size: 18px; font-weight: 600; margin-top: 5px; letter-spacing: -0.2px; }
  .inv-units span { font-size: 12px; color: var(--text-3); font-weight: 400; margin-left: 3px; }

  /* ---------- Chart ---------- */
  .chart-wrap { background: var(--well); border-radius: 12px; padding: 12px 12px 8px; height: 160px; position: relative; }
  .chart-wrap canvas { max-height: 100% !important; }

  /* ---------- Placeholder ---------- */
  .placeholder { background: var(--well); border-radius: 12px; padding: 16px; color: var(--text-3); font-size: 13px; line-height: 1.5; }

  /* ---------- Schedule ---------- */
  .day-bar { display: flex; gap: 4px; margin-bottom: 14px; }
  .day-cell {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
    padding: 9px 0; border-radius: 10px; background: var(--well);
    font-size: 12px; font-weight: 600; color: var(--text-2);
  }
  .day-cell.is-today { background: var(--blue); color: #fff; }
  .timeline { display: flex; flex-direction: column; gap: 14px; }
  .timeline-row { display: flex; gap: 12px; align-items: flex-start; }
  .timeline-time { font-size: 12px; color: var(--text-3); font-weight: 600; width: 60px; flex-shrink: 0; padding-top: 2px; }
  .timeline-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .timeline-content { flex: 1; min-width: 0; }
  .timeline-title { font-size: 15px; font-weight: 500; }
  .timeline-sub { font-size: 12px; color: var(--text-3); margin-top: 2px; }

  /* ---------- Accounts ---------- */
  .account-list { display: flex; flex-direction: column; }
  .account-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--separator);
  }
  .account-row:first-child { padding-top: 0; }
  .account-row:last-child { border-bottom: none; padding-bottom: 0; }
  .account-name { font-size: 15px; font-weight: 500; }
  .account-badge {
    font-size: 12px; font-weight: 600; color: var(--text-2);
    background: var(--well); border-radius: 8px; padding: 3px 9px;
  }
  .account-badge.has-unread { color: var(--blue); background: rgba(91,141,184,0.1); }

  /* ---------- Footer ---------- */
  .footer { text-align: center; padding-top: 4px; display: flex; flex-direction: column; gap: 5px; animation: fadeUp 0.5s ease both; }
  .footer-updated { font-size: 12px; color: var(--text-3); font-weight: 500; }
  .footer-sources { font-size: 11px; color: var(--text-3); opacity: 0.7; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Tap feedback ---------- */
  .tappable { cursor: pointer; transition: transform 0.2s ease, background-color 0.2s ease; -webkit-user-select: none; user-select: none; }
  .tappable:active { transform: scale(0.97); }

  /* ---------- Header ---------- */
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .refresh-btn {
    width: 32px; height: 32px; border-radius: 50%; background: var(--well);
    display: flex; align-items: center; justify-content: center; color: var(--text-2);
    flex-shrink: 0; margin-top: 2px; transition: transform 0.2s ease, background-color 0.2s ease;
  }
  .refresh-btn:active { transform: scale(0.9) rotate(180deg); background: var(--track); }

  /* ---------- Life score breakdown ---------- */
  .life-score-breakdown { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; overflow: hidden; }
  .life-score.expanded .life-score-breakdown { grid-template-rows: 1fr; }
  .life-score-breakdown-inner { overflow: hidden; min-height: 0; }
  .life-score-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0; font-size: 12px; color: var(--text-2); border-top: 1px solid var(--separator);
  }
  .life-score-item:first-child { border-top: none; padding-top: 9px; }
  .life-score-item b { color: var(--text); font-weight: 600; }

  /* ---------- Focus items ---------- */
  .focus-item.done { opacity: 0.4; }
  .focus-item.done .focus-text { text-decoration: line-through; }
  .focus-checkbox {
    width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--track);
    flex-shrink: 0; margin-top: 4px; display: flex; align-items: center; justify-content: center;
    color: #fff; transition: background-color 0.2s ease, border-color 0.2s ease;
  }
  .focus-item.done .focus-checkbox { background: var(--green); border-color: var(--green); }

  /* ---------- Email swipe ---------- */
  .email-row-wrap {
    position: relative; overflow: hidden; border-bottom: 1px solid var(--separator);
    max-height: 200px; transition: max-height 0.3s ease, opacity 0.3s ease;
  }
  .email-row-wrap:last-child { border-bottom: none; }
  .email-row-wrap.removing { max-height: 0; opacity: 0; border-bottom: none; }
  .email-row {
    display: flex; flex-direction: column; gap: 3px; padding: 11px 0;
    background: var(--card); position: relative; z-index: 1; transition: transform 0.3s ease;
  }
  .email-row-wrap:first-child .email-row { padding-top: 0; }
  .email-row-wrap:last-child .email-row { padding-bottom: 0; }
  .email-row-wrap.swiped .email-row { transform: translateX(-84px); }
  .email-dismiss {
    position: absolute; top: 0; right: -84px; bottom: 0; width: 84px;
    background: var(--red); color: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; border-radius: 10px; transition: right 0.3s ease;
  }
  .email-row-wrap.swiped .email-dismiss { right: 0; }

  /* ---------- Paid / done list rows ---------- */
  .list-row.is-paid .list-name, .list-row.is-paid .list-amount, .list-row.is-paid .list-sub {
    text-decoration: line-through; color: var(--text-3) !important;
  }
  .paid-badge {
    font-size: 11px; font-weight: 600; color: var(--green);
    background: rgba(91,154,111,0.1); border-radius: 6px; padding: 2px 8px; margin-left: 6px;
    display: inline-flex; align-items: center; gap: 3px;
  }
  .list-row:not(.is-paid) .paid-badge { display: none; }

  /* ---------- Stat / hero tap states ---------- */
  .stat-box.tappable:active, .hero-stat.tappable:active { background: var(--track); }

  /* ---------- Day cell tap ---------- */
  .day-cell.tappable:active { transform: scale(0.93); }

  /* ---------- Timeline expand ---------- */
  .timeline-detail { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; overflow: hidden; }
  .timeline-row.expanded .timeline-detail { grid-template-rows: 1fr; }
  .timeline-detail-inner { overflow: hidden; min-height: 0; }
  .timeline-detail-text { font-size: 12px; color: var(--text-3); padding-top: 8px; }

  /* ---------- Account expand ---------- */
  .account-row { flex-direction: column; align-items: stretch; justify-content: flex-start; gap: 0; }
  .account-row-top { display: flex; align-items: center; justify-content: space-between; }
  .account-subjects { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; overflow: hidden; }
  .account-row.expanded .account-subjects { grid-template-rows: 1fr; }
  .account-subjects-inner { overflow: hidden; min-height: 0; }
  .account-subject {
    font-size: 12px; color: var(--text-3); padding-top: 6px; margin-top: 6px; border-top: 1px solid var(--separator);
  }
  .account-subject:first-child { border-top: 1px solid var(--separator); }
  .account-subjects-empty { font-size: 12px; color: var(--text-3); padding-top: 6px; margin-top: 6px; border-top: 1px solid var(--separator); }

  /* ---------- Knowledge progress pct ---------- */
  .progress-pct { font-size: 11px; color: var(--text-3); font-weight: 600; margin-left: 6px; }

  /* ---------- Row detail expand (week schedule, etc.) ---------- */
  .row-group { display: flex; flex-direction: column; }
  .row-detail { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; overflow: hidden; }
  .row-group.expanded .row-detail { grid-template-rows: 1fr; }
  .row-detail-inner { overflow: hidden; min-height: 0; }
  .row-detail-text { font-size: 12px; color: var(--text-3); padding: 8px 14px 0; }
</style>
</head>
<body>
<div class="app">

  <header class="header" id="header"></header>

  <section class="section" id="focus-section">
    <div class="section-header">Focus Today</div>
    <div class="card"><ol class="focus-list" id="focusList"></ol></div>
  </section>

  <section class="section" id="email-section">
    <div class="section-header">Emails</div>
    <div class="card"><div class="email-list" id="emailList"></div></div>
  </section>

  <section class="section" id="pillars-section">
    <div class="section-header">Pillars</div>
    <div class="pillars" id="pillars"></div>
  </section>

  <section class="section" id="schedule-section">
    <div class="section-header">Today's Schedule</div>
    <div class="card" id="schedule"></div>
  </section>

  <section class="section" id="accounts-section">
    <div class="section-header">Accounts</div>
    <div class="card"><div class="account-list" id="accountsList"></div></div>
  </section>

  <section class="section" id="subs-section">
    <div class="section-header">Subscriptions</div>
    <div class="card"><div class="list" id="subsList"></div></div>
  </section>

  <footer class="footer" id="footer"></footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>

/* =========================================================
   HELPERS
   ========================================================= */
const COLOR = {
  red: "#C45C4A",
  orange: "#C68B4B",
  green: "#5B9A6F",
  blue: "#5B8DB8",
  purple: "#8B7BB5",
  gray: "#B5AFA8",
  dark: "#2C2825",
};

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function dotSvg(colorKey, size = 8) {
  const c = COLOR[colorKey] || COLOR.gray;
  return `<svg width="${size}" height="${size}" viewBox="0 0 8 8" style="flex-shrink:0"><circle cx="4" cy="4" r="4" fill="${c}"/></svg>`;
}

/* =========================================================
   RENDER: HEADER
   ========================================================= */
function computeLifeScore() {
  const total = DATA.pillars.reduce((sum, p) => sum + p.score * p.weight, 0);
  return Math.round(total);
}

function renderHeader() {
  const now = new Date();
  const hour = parseInt(
    now.toLocaleString("en-AU", { hour: "numeric", hour12: false, timeZone: "Australia/Brisbane" }),
    10
  );
  let greeting = "Good morning";
  if (hour >= 12 && hour < 17) greeting = "Good afternoon";
  else if (hour >= 17 || hour < 5) greeting = "Good evening";

  const dateStr = now.toLocaleDateString("en-AU", {
    weekday: "long", day: "numeric", month: "long", timeZone: "Australia/Brisbane",
  });

  const score = computeLifeScore();

  document.getElementById("header").innerHTML = `
    <div class="header-top">
      <div>
        <div class="greeting">${greeting}, ${DATA.user.name}</div>
        <div class="date">${dateStr}</div>
      </div>
      <div class="refresh-btn tappable" id="refreshBtn" title="Refresh">${svgIcon("refresh", 16, 2)}</div>
    </div>
    <div class="life-score tappable" id="lifeScoreToggle">
      <div class="life-score-row">
        <span class="life-score-label">Life score</span>
        <span class="life-score-value">${score}/100</span>
      </div>
      <div class="life-score-track"><div class="life-score-fill" id="lifeScoreFill"></div></div>
      <div class="life-score-breakdown">
        <div class="life-score-breakdown-inner">
          ${DATA.pillars.map(p => `
            <div class="life-score-item">
              <span>${p.name} <span style="color:var(--text-3)">(${Math.round(p.weight * 100)}% weight)</span></span>
              <b>${p.score}/100 → +${(p.score * p.weight).toFixed(1)}</b>
            </div>
          `).join("")}
        </div>
      </div>
    </div>
  `;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.getElementById("lifeScoreFill").style.width = `${score}%`;
    });
  });

  document.getElementById("refreshBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    location.reload();
  });

  document.getElementById("lifeScoreToggle").addEventListener("click", () => {
    document.getElementById("lifeScoreToggle").classList.toggle("expanded");
  });
}

/* =========================================================
   RENDER: FOCUS TODAY
   ========================================================= */
function renderFocusToday() {
  const done = JSON.parse(sessionStorage.getItem("focusDone") || "[]");
  document.getElementById("focusList").innerHTML = DATA.focusToday.map((f, i) => `
    <li class="focus-item tappable ${done[i] ? "done" : ""}" data-index="${i}">
      <span class="focus-checkbox">${done[i] ? svgIcon("check", 11, 2.5) : ""}</span>
      <span class="focus-dot" style="background:${COLOR[f.color]}"></span>
      <span class="focus-num">${i + 1}.</span>
      <span class="focus-text">${f.text}</span>
    </li>
  `).join("");

  document.querySelectorAll(".focus-item").forEach(item => {
    item.addEventListener("click", () => {
      const i = item.dataset.index;
      const done = JSON.parse(sessionStorage.getItem("focusDone") || "[]");
      done[i] = !done[i];
      sessionStorage.setItem("focusDone", JSON.stringify(done));
      item.classList.toggle("done");
      item.querySelector(".focus-checkbox").innerHTML = done[i] ? svgIcon("check", 11, 2.5) : "";
    });
  });
}

   RENDER: EMAILS
   ========================================================= */
function renderEmails() {
  document.getElementById("emailList").innerHTML = DATA.emails.map((e, i) => `
    <div class="email-row-wrap" data-index="${i}">
      <div class="email-row tappable">
        <div class="email-top">
          <span class="email-sender">${e.sender}</span>
          <span class="email-time">${e.time}</span>
        </div>
        <div class="email-subject">${e.subject}</div>
      </div>
      <div class="email-dismiss">Dismiss</div>
    </div>
  `).join("");

  document.querySelectorAll(".email-row-wrap").forEach(wrap => {
    const row = wrap.querySelector(".email-row");
    const dismiss = wrap.querySelector(".email-dismiss");
    row.addEventListener("click", () => wrap.classList.toggle("swiped"));
    dismiss.addEventListener("click", (ev) => {
      ev.stopPropagation();
      wrap.classList.remove("swiped");
      wrap.classList.add("removing");
      wrap.addEventListener("transitionend", () => wrap.remove(), { once: true });
    });
  });
}

/* =========================================================
   RENDER: TODAY'S SCHEDULE
   ========================================================= */
function renderSchedule() {
  const s = DATA.schedule;

  const dayBar = s.days.map(d => `
    <div class="day-cell ${d === s.today ? "is-today" : ""}">
      <span>${d}</span>
      ${s.contentDays.includes(d) ? dotSvg(d === s.today ? "blue" : "blue", 5) : ""}
    </div>
  `).join("");

  const timeline = s.events.map(e => `
    <div class="timeline-row tappable">
      <div class="timeline-time">${e.time}</div>
      <div class="timeline-dot" style="background:${COLOR[e.color]}"></div>
      <div class="timeline-content">
        <div class="timeline-title">${e.title}</div>
        <div class="timeline-sub">${e.sub}</div>
        ${e.detail ? `<div class="timeline-detail"><div class="timeline-detail-inner"><div class="timeline-detail-text">${e.detail}</div></div></div>` : ""}
      </div>
    </div>
  `).join("");

  document.getElementById("schedule").innerHTML = `
    <div class="day-bar">${dayBar}</div>
    <div class="timeline">${timeline}</div>
  `;

  document.querySelectorAll("#schedule .timeline-row").forEach(row => {
    if (!row.querySelector(".timeline-detail")) return;
    row.addEventListener("click", () => row.classList.toggle("expanded"));
  });
}

          <div class="progress-track"><div class="progress-fill" data-pct="${it.percent}" id="progress-${i}-${it.name.replace(/[^a-zA-Z0-9]/g, "")}"></div></div>
          ${it.sub ? `<div class="progress-sub">${it.sub}</div>` : ""}
        </div>
      `).join("")}
    </div>
  `;
}

function habitTrackerBlock(items) {
  const labels = lastNDayLabels(items.length);
  return `
    <div class="habit-row" id="habitTracker">
      ${items.map((done, i) => `
        <div class="habit-cell">
          <span class="habit-day">${labels[i]}</span>
          <span class="habit-dot">${dotSvg(done ? "green" : "red", 10)}</span>
        </div>
      `).join("")}
    </div>
  `;
}

function placeholderBlock(text) {
  return `<div class="placeholder">${text}</div>`;
}

function chartBlock(id) {
  return `<div class="chart-wrap"><canvas id="${id}"></canvas></div>`;
}

/* =========================================================
   RENDER: PILLARS
   ========================================================= */
function renderPillars() {
  const html = DATA.pillars.map((p, i) => {
    const sections = [];

    if (p.key === "physical") {
      const raceDate = new Date();
      raceDate.setDate(raceDate.getDate() + p.marathon.daysOut);
      const raceDateStr = raceDate.toLocaleDateString("en-AU", { weekday: "short", day: "numeric", month: "short", timeZone: "Australia/Brisbane" });
      sections.push(heroStat(p.marathon.name, `${p.marathon.daysOut} days to go`, `${p.marathon.note} · ${raceDateStr}`, p.marathon.paceInfo));
      sections.push(labeled(p.trainingBlock.label, segmentBlock(p.trainingBlock)));
      sections.push(labeled("Today", listRows([{ name: p.today.title, sub: p.today.sub, isCurrent: true }])));
      sections.push(labeled("Week 3 Schedule", weekScheduleBlock(p.weekSchedule)));
      sections.push(labeled("WHOOP", statGrid(p.whoop.items) + `<div class="progress-sub" style="margin-top:10px;">${p.whoop.note}</div>`));
      sections.push(labeled("Heart Rate Zones", listRows(p.heartRateZones.map(z => ({
        name: z.zone, dotColor: z.color, amount: z.range,
      })))));
    }

    if (p.key === "capital") {
      sections.push(statGrid(p.stats));
      sections.push(labeled(p.revenueChart.label, chartBlock(`chart-${p.key}-revenue`)));
      sections.push(labeled(p.bills.label, payableListBlock(p.bills.items.map(b => ({
        name: b.name, sub: b.due, amount: b.amount, overdue: b.overdue, dueToday: b.dueToday,
      })), "bills-capital")));
      sections.push(labeled(p.shopify.label, statGrid([
        { label: "Products listed", value: p.shopify.productsListed },
        { label: "Active products", value: p.shopify.activeProducts },
        { label: "Inventory units", value: p.shopify.inventoryUnits.toLocaleString() },
      ])));
      sections.push(labeled(p.expenses.label, listRows(p.expenses.items.map(e => ({
        name: e.name, dotColor: e.color, amount: `$${e.amount}`,
      })))));
    }

    if (p.key === "brand") {
      sections.push(statGrid([
        { label: p.contentSchedule.label, value: p.contentSchedule.value },
        { label: p.notion.label, value: p.notion.value, sub: p.notion.sub },
      ]));
      sections.push(labeled(p.contentPillars.label, listRows(p.contentPillars.items.map(name => ({
        name, dotColor: "blue",
      })))));
      sections.push(labeled(p.postingStatus.label, checkRows(p.postingStatus.items)));
    }

    if (p.key === "build") {
      sections.push(labeled(p.marketingPhases.label, segmentBlock(p.marketingPhases) + `<div class="progress-sub" style="margin-top:10px;">${p.marketingPhases.current}</div>`));
      sections.push(labeled(p.inventory.label, inventoryBlock(p.inventory.items)));
      sections.push(labeled(p.devProjects.label, listRows(p.devProjects.items.map(d => ({
        name: d.name, dotColor: d.color, amount: d.status,
      })))));
    }

    if (p.key === "discipline") {
      sections.push(statGrid(p.stats));
      sections.push(labeled(p.tasksChart.label, chartBlock(`chart-${p.key}-tasks`)));
      sections.push(labeled(p.karmaChart.label, chartBlock(`chart-${p.key}-karma`)));
      sections.push(labeled(p.habitTracker.label, habitTrackerBlock(p.habitTracker.items)));
      sections.push(labeled(p.todoistTasks.label, checkRows(p.todoistTasks.items)));
    }

    if (p.key === "spirit") {
      sections.push(`
        <div class="stat-grid">
          <div class="stat-box">
            <div class="stat-label">${p.reading.label}</div>
            <div class="stat-value">
              <span class="dot" id="readingStreakDot" style="background:${COLOR[p.reading.streak > 0 ? "green" : "red"]}"></span>
              <span id="readingStreakValue">${p.reading.streak} days</span>
            </div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Today's reading</div>
            <div class="stat-value">Not set</div>
          </div>
        </div>
      `);
      sections.push(labeled("Today's Reading", placeholderBlock(p.reading.placeholder)));
      sections.push(labeled(p.verse.label, placeholderBlock(p.verse.placeholder)));
      sections.push(labeled(p.notes.label, placeholderBlock(p.notes.placeholder)));
    }

    if (p.key === "knowledge") {
      sections.push(progressRows(p.areas));
    }

    return `
      <section class="pillar-card" id="pillar-${p.key}" style="animation-delay:${i * 0.05}s">
        <div class="pillar-header" data-key="${p.key}">
          <div class="pillar-icon" style="--icon-bg:${hexToRgba(COLOR[p.color], 0.06)}; --icon-fg:${COLOR[p.color]}">${svgIcon(p.icon, 20)}</div>
          <div class="pillar-info">
            <div class="pillar-name-row">
              <span class="pillar-name">${p.name}</span>
              <span class="pillar-status" style="color:${COLOR[p.color]}">${p.status}</span>
            </div>
            <div class="pillar-progress">
              <div class="pillar-progress-track"><div class="pillar-progress-fill" data-score="${p.score}" style="--fill:${COLOR[p.color]}"></div></div>
              <span class="pillar-progress-pct">${p.score}/100</span>
            </div>
          </div>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </div>
        <div class="pillar-body-wrap">
          <div class="pillar-body">
            <div class="pillar-body-inner">
              ${sections.join("")}
            </div>
          </div>
        </div>
      </section>
    `;
  }).join("");

  document.getElementById("pillars").innerHTML = html;

  // animate progress bars in
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll(".pillar-progress-fill").forEach(el => {
        el.style.width = `${el.dataset.score}%`;
      });
    });
  });

  // expand / collapse
  document.querySelectorAll(".pillar-header").forEach(header => {
    header.addEventListener("click", () => togglePillar(header.closest(".pillar-card")));
  });

  // hero stat: tap to cycle detail views
  document.querySelectorAll(".hero-stat[data-alt-sub]").forEach(el => {
    el.addEventListener("click", () => {
      const sub = el.querySelector(".hero-stat-sub");
      const showingAlt = el.classList.toggle("showing-alt");
      sub.textContent = showingAlt ? el.dataset.altSub : el.dataset.defaultSub;
    });
  });

  // week schedule: tap other days to expand details
  document.querySelectorAll(".row-group.tappable").forEach(group => {
    group.addEventListener("click", () => group.classList.toggle("expanded"));
  });

  // bills: tap to mark as paid
  setupPaidToggles("bills-capital");
}

const chartInstances = {};

function togglePillar(pillarEl) {
  const wasExpanded = pillarEl.classList.contains("expanded");
  pillarEl.classList.toggle("expanded");

  if (!wasExpanded) {
    const key = pillarEl.querySelector(".pillar-header").dataset.key;
    setTimeout(() => initChartsFor(key), 80);
    setTimeout(() => animateProgressRows(pillarEl), 80);
  }
}

function animateProgressRows(pillarEl) {
  pillarEl.querySelectorAll(".progress-fill").forEach(el => {
    el.style.width = `${el.dataset.pct}%`;
  });
}

function initChartsFor(key) {
  const p = DATA.pillars.find(x => x.key === key);
  if (!p) return;

  if (p.revenueChart && !chartInstances[`chart-${key}-revenue`]) {
    chartInstances[`chart-${key}-revenue`] = makeRevenueChart(`chart-${key}-revenue`, p.revenueChart);
  }
  if (p.karmaChart && !chartInstances[`chart-${key}-karma`]) {
    chartInstances[`chart-${key}-karma`] = makeKarmaChart(`chart-${key}-karma`, p.karmaChart);
  }
  if (p.tasksChart && !chartInstances[`chart-${key}-tasks`]) {
    chartInstances[`chart-${key}-tasks`] = makeTasksChart(`chart-${key}-tasks`, p.tasksChart);
  }
}

/* =========================================================
   CHARTS
   ========================================================= */
Chart.defaults.color = "#8A8279";
Chart.defaults.font.family = "-apple-system, 'SF Pro Display', system-ui, sans-serif";
Chart.defaults.font.size = 11;
Chart.defaults.font.weight = "500";

const TOOLTIP_STYLE = {
  backgroundColor: "#2C2825",
  titleColor: "#FAF8F5",
  bodyColor: "#FAF8F5",
  padding: 8,
  cornerRadius: 8,
};

function makeRevenueChart(canvasId, cfg) {
  const ctx = document.getElementById(canvasId).getContext("2d");
  const colors = cfg.data.map(v => v > 0 ? COLOR.green : "#EDEAE6");
  return new Chart(ctx, {
    type: "bar",
    data: {
      labels: cfg.labels,
      datasets: [{
        data: cfg.data,
        backgroundColor: colors,
        borderRadius: 6,
        maxBarThickness: 36,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { ...TOOLTIP_STYLE, callbacks: { label: (c) => `$${c.parsed.y}` } },
      },
      scales: {
        x: { grid: { display: false }, border: { display: false } },
        y: {
          grid: { color: "rgba(120,100,80,0.06)" },
          border: { display: false },
          ticks: { callback: (v) => `$${v}` },
          beginAtZero: true,
        },
      },
    },
  });
}

function lastNDayLabels(n) {
  const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  const today = new Date();
  const labels = [];
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    labels.push(days[d.getDay()]);
  }
  return labels;
}

function makeKarmaChart(canvasId, cfg) {
  const ctx = document.getElementById(canvasId).getContext("2d");
  const gradient = ctx.createLinearGradient(0, 0, 0, 150);
  gradient.addColorStop(0, hexToRgba(COLOR.blue, 0.18));
  gradient.addColorStop(1, hexToRgba(COLOR.blue, 0));

  const min = Math.min(...cfg.data);
  const max = Math.max(...cfg.data);
  const pad = Math.max(4, Math.round((max - min) * 0.4));

  return new Chart(ctx, {
    type: "line",
    data: {
      labels: lastNDayLabels(cfg.data.length),
      datasets: [{
        data: cfg.data,
        borderColor: COLOR.blue,
        backgroundColor: gradient,
        fill: true,
        tension: 0.35,
        pointRadius: 3,
        pointBackgroundColor: COLOR.blue,
        pointBorderColor: "#FFFFFF",
        pointBorderWidth: 1.5,
        borderWidth: 2.5,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: TOOLTIP_STYLE,
      },
      scales: {
        x: { grid: { display: false }, border: { display: false } },
        y: {
          grid: { color: "rgba(120,100,80,0.06)" },
          border: { display: false },
          min: min - pad,
          max: max + pad,
          ticks: { maxTicksLimit: 4 },
        },
      },
    },
  });
}

const goalLinePlugin = {
  id: "goalLine",
  afterDatasetsDraw(chart, args, opts) {
    if (!opts || opts.value == null) return;
    const { ctx, chartArea, scales } = chart;
    const y = scales.y.getPixelForValue(opts.value);
    if (y < chartArea.top || y > chartArea.bottom) return;
    ctx.save();
    ctx.strokeStyle = opts.color || "#8A8279";
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.moveTo(chartArea.left, y);
    ctx.lineTo(chartArea.right, y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = opts.color || "#8A8279";
    ctx.font = "600 10px -apple-system, sans-serif";
    ctx.textAlign = "right";
    ctx.fillText(opts.label || "", chartArea.right - 4, y - 6);
    ctx.restore();
  },
};

function makeTasksChart(canvasId, cfg) {
  const ctx = document.getElementById(canvasId).getContext("2d");
  return new Chart(ctx, {
    type: "bar",
    data: {
      labels: lastNDayLabels(cfg.data.length),
      datasets: [{
        data: cfg.data,
        backgroundColor: COLOR.blue,
        borderRadius: 6,
        maxBarThickness: 28,
      }],
    },
    plugins: [goalLinePlugin],
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: TOOLTIP_STYLE,
        goalLine: { value: cfg.goal, color: "#8A8279", label: `Goal ${cfg.goal}` },
      },
      scales: {
        x: { grid: { display: false }, border: { display: false } },
        y: {
          grid: { color: "rgba(120,100,80,0.06)" },
          border: { display: false },
          beginAtZero: true,
          max: Math.max(cfg.goal * 1.15, Math.max(...cfg.data) * 1.4),
          ticks: { maxTicksLimit: 4 },
        },
      },
    },
  });
}

   RENDER: ACCOUNTS

// register service worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").then(reg => {
    reg.update();
  }).catch(() => {});
}
